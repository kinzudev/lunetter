<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Lunetter — Demo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    /* Estilos compactos (mantiene diseño tipo Twitter, fondo negro) */
    :root{--accent:#1DA1F2;--card:#0f1113;--muted:#777}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter, "Segoe UI", Arial, sans-serif;background:#000;color:#e6e6e6;display:flex;height:100vh}
    /* Login panel */
    #loginPanel{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;z-index:30}
    .loginBox{width:340px;background:#0b0c0d;border:1px solid #222;padding:20px;border-radius:12px;display:flex;flex-direction:column;gap:10px}
    .loginBox h2{margin:0 0 6px 0}
    .loginBox input[type="text"], .loginBox input[type="password"]{padding:10px;border-radius:8px;border:1px solid #222;background:#0f1113;color:#fff;outline:none}
    .loginBox input[type=file]{color:#ddd}
    .rowBtns{display:flex;gap:10px;margin-top:6px}
    .btn{background:var(--accent);border:none;padding:9px 12px;border-radius:9px;color:#fff;cursor:pointer}
    .btn.secondary{background:#222}
    .error{color:#ff6b6b;font-size:13px;min-height:18px}
    /* Layout */
    .sidebar{width:220px;border-right:1px solid #111;padding:20px;display:flex;flex-direction:column;gap:8px}
    .sidebar button{background:none;border:none;color:inherit;text-align:left;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:16px}
    .sidebar button:hover{background:#0f1113;color:var(--accent)}
    .main{flex:1;display:flex;justify-content:center;overflow:auto;padding:20px}
    .feed{width:100%;max-width:640px}
    /* composer */
    .composer{display:flex;gap:12px;padding:14px;background:transparent;border-bottom:1px solid #111}
    .composer img{width:52px;height:52px;border-radius:50%}
    .composer textarea{flex:1;background:transparent;border:none;color:#e6e6e6;font-size:15px;outline:none;resize:none}
    .composer .postBtn{align-self:flex-end}
    /* posts */
    .post{display:flex;gap:12px;padding:14px;border-bottom:1px solid #111}
    .post img{width:48px;height:48px;border-radius:50%}
    .postContent{flex:1}
    .postHeader{display:flex;align-items:center;gap:8px}
    .postHeader .name{font-weight:700;color:var(--accent)}
    .postHeader .user{color:var(--muted);font-size:13px}
    .postText{margin:8px 0 6px 0;line-height:1.35}
    .actions{display:flex;gap:16px;color:var(--muted);font-size:14px;align-items:center}
    .actions .likeBtn{cursor:pointer;user-select:none}
    .actions .likeBtn.liked{color:#ff6b6b}
    .comments{margin-top:8px;padding-left:8px;border-left:2px solid #111}
    .comment{display:flex;gap:8px;margin-top:8px}
    .comment img{width:32px;height:32px;border-radius:50%}
    .commentBubble{background:#0d0e10;padding:8px;border-radius:8px}
    .commentInput{display:flex;gap:8px;margin-top:10px}
    .commentInput input{flex:1;padding:8px;border-radius:8px;border:1px solid #222;background:#0f1113;color:#fff;outline:none}
    /* utilities */
    .hidden{display:none}
    .muted{color:var(--muted);font-size:13px}
  </style>
</head>
<body>
  <!-- LOGIN / REGISTER -->
  <div id="loginPanel">
    <div class="loginBox">
      <h2>Lunetter — Entrar / Registrarse</h2>

      <input id="inpUsername" type="text" placeholder="Nombre de usuario (sin espacios)" />
      <input id="inpPassword" type="password" placeholder="Contraseña" />
      <label class="muted" style="font-size:13px;margin-top:4px">Avatar opcional (imagen)</label>
      <input id="inpAvatar" type="file" accept="image/*" />

      <div class="rowBtns">
        <button id="btnLogin" class="btn">Ingresar</button>
        <button id="btnRegister" class="btn secondary">Registrarse</button>
      </div>

      <div id="loginError" class="error"></div>
      <div style="font-size:12px;color:#666;margin-top:6px">La contraseña se hash-ea localmente (SHA-256). Esto es una demo — en producción usa reglas seguras.</div>
    </div>
  </div>

  <!-- APP -->
  <div id="appUI" class="hidden" style="display:flex;width:100%">
    <aside class="sidebar">
      <button>Home</button>
      <button>Explore</button>
      <button>Notifications</button>
      <button>Profile</button>
      <div style="flex:1"></div>
      <div style="display:flex;gap:8px;align-items:center">
        <img id="sidebarAvatar" src="https://i.pravatar.cc/100" alt="avatar" style="width:36px;height:36px;border-radius:50%" />
        <div style="flex:1">
          <div id="sidebarUser" style="font-weight:700"></div>
          <button onclick="logout()" style="background:#222;border:none;color:#ddd;padding:6px;border-radius:8px;cursor:pointer">Cerrar sesión</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="feed">
        <!-- Composer -->
        <div class="composer">
          <img id="composerAvatar" src="https://i.pravatar.cc/100" alt="avatar" />
          <div style="flex:1;display:flex;flex-direction:column">
            <textarea id="postInput" rows="3" placeholder="¿Qué está pasando?"></textarea>
            <div style="display:flex;justify-content:flex-end;margin-top:8px">
              <button class="btn postBtn" onclick="addPost()">Publicar</button>
            </div>
          </div>
        </div>

        <!-- Posts list -->
        <div id="posts"></div>
      </div>
    </main>
  </div>

  <!-- Firebase (modular v9) -->
  <script type="module">
    // Imports (Firebase modular)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import {
      getFirestore, collection, addDoc, onSnapshot, orderBy, query, serverTimestamp,
      doc, setDoc, getDoc, deleteDoc
    } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-storage.js";

    /***** Usa exactamente tu firebaseConfig aquí *****/
    const firebaseConfig = {
      apiKey: "AIzaSyBZvsL3zwUsHmTL0QZxQOkWF28_N2FR4L0",
      authDomain: "lunetter-55d46.firebaseapp.com",
      projectId: "lunetter-55d46",
      storageBucket: "lunetter-55d46.firebasestorage.app",
      messagingSenderId: "798507844928",
      appId: "1:798507844928:web:20e8a48a66a85ee6c6e6a5",
      measurementId: "G-46BL2MEZ68"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // Estado local
    let currentUser = null; // {username, avatar}
    const postListeners = {}; // para desuscribir likes/comments por post

    /* ---------- util: hash SHA-256 (hex) ---------- */
    async function hashPassword(password) {
      const enc = new TextEncoder();
      const data = enc.encode(password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    /* ---------- UI refs ---------- */
    const loginPanel = document.getElementById('loginPanel');
    const loginError = document.getElementById('loginError');
    const inpUsername = document.getElementById('inpUsername');
    const inpPassword = document.getElementById('inpPassword');
    const inpAvatar = document.getElementById('inpAvatar');
    const btnLogin = document.getElementById('btnLogin');
    const btnRegister = document.getElementById('btnRegister');

    const appUI = document.getElementById('appUI');
    const sidebarUser = document.getElementById('sidebarUser');
    const sidebarAvatar = document.getElementById('sidebarAvatar');
    const composerAvatar = document.getElementById('composerAvatar');
    const postsDiv = document.getElementById('posts');

    /* ---------- Register ---------- */
    btnRegister.addEventListener('click', async () => {
      loginError.textContent = '';
      const username = inpUsername.value.trim();
      const password = inpPassword.value;
      if (!username) { loginError.textContent = 'Ingresa un nombre de usuario.'; return; }
      if (!password) { loginError.textContent = 'Ingresa una contraseña.'; return; }
      if (/\s/.test(username)) { loginError.textContent = 'El nombre no puede contener espacios.'; return; }

      try {
        // comprobar si ya existe doc con id = username
        const userRef = doc(db, 'users', username);
        const snapshot = await getDoc(userRef);
        if (snapshot.exists()) {
          loginError.textContent = 'Ese nombre de usuario ya está en uso.';
          return;
        }

        // subir avatar si hay archivo
        let avatarURL = 'https://i.pravatar.cc/100?u=' + encodeURIComponent(username);
        const file = inpAvatar.files[0];
        if (file) {
          const storageRef = ref(storage, `avatars/${username}`);
          await uploadBytes(storageRef, file);
          avatarURL = await getDownloadURL(storageRef);
        }

        const passwordHash = await hashPassword(password);

        // crear usuario en Firestore usando username como id
        await setDoc(userRef, {
          username,
          passwordHash,
          avatar: avatarURL,
          createdAt: serverTimestamp()
        });

        // iniciar sesión automáticamente
        currentUser = { username, avatar: avatarURL };
        localStorage.setItem('sessionUser', JSON.stringify(currentUser));
        showApp();
      } catch (err) {
        console.error(err);
        loginError.textContent = 'Error registrando: ' + (err.message || err);
      }
    });

    /* ---------- Login ---------- */
    btnLogin.addEventListener('click', async () => {
      loginError.textContent = '';
      const username = inpUsername.value.trim();
      const password = inpPassword.value;
      if (!username || !password) { loginError.textContent = 'Completa nombre y contraseña.'; return; }

      try {
        const userRef = doc(db, 'users', username);
        const snapshot = await getDoc(userRef);
        if (!snapshot.exists()) {
          loginError.textContent = 'Usuario no encontrado.';
          return;
        }
        const data = snapshot.data();
        const passwordHash = await hashPassword(password);
        if (data.passwordHash !== passwordHash) {
          loginError.textContent = 'Contraseña incorrecta.';
          return;
        }

        currentUser = { username: data.username, avatar: data.avatar || ('https://i.pravatar.cc/100?u=' + encodeURIComponent(data.username)) };
        localStorage.setItem('sessionUser', JSON.stringify(currentUser));
        showApp();
      } catch (err) {
        console.error(err);
        loginError.textContent = 'Error al iniciar sesión.';
      }
    });

    /* ---------- Restore session on load ---------- */
    window.addEventListener('load', () => {
      const s = localStorage.getItem('sessionUser');
      if (s) {
        try {
          currentUser = JSON.parse(s);
          showApp();
        } catch(e){ localStorage.removeItem('sessionUser'); }
      }
    });

    /* ---------- show app ---------- */
    function showApp() {
      loginPanel.style.display = 'none';
      appUI.classList.remove('hidden');
      sidebarUser.textContent = currentUser.username;
      sidebarAvatar.src = currentUser.avatar;
      composerAvatar.src = currentUser.avatar;
      renderPostsRealtime();
    }

    /* ---------- logout ---------- */
    window.logout = function() {
      // desuscribir listeners
      for (const k in postListeners) {
        if (postListeners[k].likesUnsub) postListeners[k].likesUnsub();
        if (postListeners[k].commentsUnsub) postListeners[k].commentsUnsub();
      }
      Object.keys(postListeners).forEach(k=>delete postListeners[k]);

      localStorage.removeItem('sessionUser');
      currentUser = null;
      // limpiar UI
      postsDiv.innerHTML = '';
      loginPanel.style.display = 'flex';
      appUI.classList.add('hidden');
      inpPassword.value = '';
    };

    /* ---------- addPost ---------- */
    window.addPost = async function() {
      if (!currentUser) return alert('Inicia sesión');
      const text = document.getElementById('postInput').value.trim();
      if (!text) return;
      try {
        await addDoc(collection(db, 'posts'), {
          user: currentUser.username,
          avatar: currentUser.avatar,
          text,
          created: serverTimestamp()
        });
        document.getElementById('postInput').value = '';
      } catch (err) {
        console.error('addPost error', err);
        alert('Error publicando');
      }
    };

    /* ---------- toggleLike: añade o borra like (id = username) ---------- */
    import { getDoc as _getDoc, } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"; // workaround for local name collision - ignored by bundlers

    window.toggleLike = async function(postId) {
      if (!currentUser) return alert('Inicia sesión');
      try {
        const likeRef = doc(db, 'posts', postId, 'likes', currentUser.username);
        const snap = await getDoc(likeRef);
        if (snap.exists()) {
          await deleteDoc(likeRef);
        } else {
          await setDoc(likeRef, { user: currentUser.username, created: serverTimestamp() });
        }
      } catch (err) {
        console.error('toggleLike error', err);
      }
    };

    /* ---------- addComment ---------- */
    window.addComment = async function(postId, inputId) {
      if (!currentUser) return alert('Inicia sesión');
      const input = document.getElementById(inputId);
      if (!input) return;
      const text = input.value.trim();
      if (!text) return;
      try {
        await addDoc(collection(db, 'posts', postId, 'comments'), {
          user: currentUser.username,
          text,
          created: serverTimestamp()
        });
        input.value = '';
      } catch (err) {
        console.error('addComment error', err);
      }
    };

    /* ---------- renderPostsRealtime (con limpieza de listeners por post) ---------- */
    function renderPostsRealtime() {
      // Limpia listeners previos
      for (const k in postListeners) {
        if (postListeners[k].likesUnsub) postListeners[k].likesUnsub();
        if (postListeners[k].commentsUnsub) postListeners[k].commentsUnsub();
      }
      Object.keys(postListeners).forEach(k=>delete postListeners[k]);

      const q = query(collection(db, 'posts'), orderBy('created', 'desc'));
      // Unsubscribe anterior si existiera (por seguridad)
      if (window.__postsUnsub) window.__postsUnsub();

      window.__postsUnsub = onSnapshot(q, (snapshot) => {
        // cada vez que cambian posts, re-render lista (pero manejamos listeners individuales)
        postsDiv.innerHTML = '';

        snapshot.forEach(docSnap => {
          const post = docSnap.data();
          const postId = docSnap.id;

          // nodo base
          const el = document.createElement('div');
          el.className = 'post';
          el.innerHTML = `
            <img src="${post.avatar || 'https://i.pravatar.cc/100'}" alt="avatar" />
            <div class="postContent">
              <div class="postHeader">
                <div style="display:flex;flex-direction:column">
                  <div style="display:flex;gap:8px;align-items:center">
                    <span class="name">${escapeHtml(post.user||'Anon')}</span>
                    <span class="user">@${escapeHtml(post.user||'anon')}</span>
                  </div>
                  <div class="muted" style="font-size:13px">${post.created ? '' : ''}</div>
                </div>
              </div>
              <div class="postText">${escapeHtml(post.text||'')}</div>

              <div class="actions">
                <span class="likeBtn" data-postid="${postId}" onclick="toggleLike('${postId}')">❤️ <span class="likesCount">0</span></span>
                <span class="openComments" data-postid="${postId}">💬 <span class="commentsCount">0</span></span>
              </div>

              <div class="comments"></div>

              <div class="commentInput">
                <input id="comment-${postId}" placeholder="Escribe un comentario..." />
                <button onclick="addComment('${postId}','comment-${postId}')">Enviar</button>
              </div>
            </div>
          `;

          postsDiv.appendChild(el);

          // Subcolección likes (en tiempo real)
          const likesRef = collection(db, 'posts', postId, 'likes');
          const likesUnsub = onSnapshot(likesRef, (likeSnap) => {
            const likesCountElem = el.querySelector('.likesCount');
            if (likesCountElem) likesCountElem.innerText = likeSnap.size;
            // marcar si el usuario actual dio like
            const liked = currentUser && likeSnap.docs.some(d => d.id === currentUser.username);
            const likeBtn = el.querySelector('.likeBtn');
            if (likeBtn) {
              if (liked) likeBtn.classList.add('liked'); else likeBtn.classList.remove('liked');
            }
          });

          // Subcolección comments (en tiempo real)
          const commentsRef = collection(db, 'posts', postId, 'comments');
          const commentsUnsub = onSnapshot(commentsRef, (commentSnap) => {
            const commentsDiv = el.querySelector('.comments');
            const commentsCountElem = el.querySelector('.commentsCount');
            commentsDiv.innerHTML = '';
            commentSnap.forEach(c => {
              const cm = c.data();
              const cmEl = document.createElement('div');
              cmEl.className = 'comment';
              cmEl.innerHTML = `<img src="https://i.pravatar.cc/32?u=${encodeURIComponent(cm.user)}" /><div class="commentBubble"><b>${escapeHtml(cm.user)}</b>: ${escapeHtml(cm.text)}</div>`;
              commentsDiv.appendChild(cmEl);
            });
            if (commentsCountElem) commentsCountElem.innerText = commentSnap.size;
          });

          // almacenar unsub para limpieza posterior
          postListeners[postId] = { likesUnsub, commentsUnsub };
        });
      }, (err)=> {
        console.error('Error escuchando posts:', err);
      });
    }

    /* ---------- seguridad: escape HTML simple para mostrar texto ---------- */
    function escapeHtml(str) {
      if (!str && str !== 0) return '';
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    /* ---------- Exponer funciones (ya lo hacemos en window) ---------- */
    // ya están expuestas: addPost, toggleLike, addComment, logout (window.*)

  </script>
</body>
</html>
