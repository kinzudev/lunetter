<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lunetter</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
    }
    .sidebar {
      width: 200px;
      background: #111;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      height: 100vh;
    }
    .sidebar button {
      background: none;
      border: none;
      color: white;
      font-size: 18px;
      text-align: left;
      cursor: pointer;
    }
    .content {
      flex: 1;
      padding: 20px;
    }
    .hidden {
      display: none;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
    .post {
      background: #222;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 10px;
    }
    .post img.post-image {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <!-- Menú lateral -->
  <div class="sidebar">
    <button id="btnHome">🏠 Home</button>
    <button id="btnProfile">👤 Profile</button>
    <button id="btnNotifications">🔔 Notifications</button>
    <button id="btnExplore">🔎 Explore</button>
  </div>

  <!-- Contenido principal -->
  <div class="content">
    <!-- Home -->
    <div id="homeSection">
      <h2>Home</h2>
      <textarea id="postInput" placeholder="What's happening?" style="width:80%;"></textarea>
      <button id="postBtn">Post</button>
      <button id="postImageBtn">Post Image</button>
      <input type="file" id="fileInput" accept="image/*" hidden>
      <div id="posts"></div>
    </div>

    <!-- Profile -->
    <div id="profileSection" class="hidden">
      <h2>Mi Perfil</h2>
      <img id="profileAvatar" class="avatar"><br>
      <input type="file" id="avatarInput" accept="image/*">
      <button id="saveAvatar">Guardar Avatar</button>
    </div>

    <!-- Notifications -->
    <div id="notificationsSection" class="hidden">
      <h2>Notificaciones</h2>
      <div id="notificationsList"></div>
    </div>

    <!-- Explore -->
    <div id="exploreSection" class="hidden">
      <h2>Explorar</h2>
      <input type="text" id="searchUser" placeholder="Buscar usuario...">
      <div id="searchResults"></div>
    </div>
  </div>

  <!-- SCRIPT -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { 
      getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, 
      updateDoc, doc, arrayUnion, arrayRemove, getDocs, where 
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBwj_as6pb5Bg81F9Cl9VWTKkekMM9Exfk",
      authDomain: "pekora-forum.firebaseapp.com",
      projectId: "pekora-forum",
      storageBucket: "pekora-forum.firebasestorage.app",
      messagingSenderId: "161910967859",
      appId: "1:161910967859:web:6a28cecaae74b9b7e9dd46",
      measurementId: "G-BPBTW5KBRK"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // Usuario actual simulado
    let user = {
      username: "lunetter",
      avatar: "https://i.pravatar.cc/150"
    };

    // ================== Navegación ==================
    const sections = {
      home: document.getElementById("homeSection"),
      profile: document.getElementById("profileSection"),
      notifications: document.getElementById("notificationsSection"),
      explore: document.getElementById("exploreSection")
    };

    function showSection(name) {
      Object.values(sections).forEach(s => s.classList.add("hidden"));
      sections[name].classList.remove("hidden");
    }

    document.getElementById("btnHome").onclick = () => showSection("home");
    document.getElementById("btnProfile").onclick = () => showSection("profile");
    document.getElementById("btnNotifications").onclick = () => showSection("notifications");
    document.getElementById("btnExplore").onclick = () => showSection("explore");

    // ================== HOME: Postear ==================
    const postsContainer = document.getElementById("posts");
    const postBtn = document.getElementById("postBtn");
    const postImageBtn = document.getElementById("postImageBtn");
    const postInput = document.getElementById("postInput");
    const fileInput = document.getElementById("fileInput");

    postBtn.addEventListener("click", async () => {
      const text = postInput.value.trim();
      if (!text) return;

      await addDoc(collection(db, "posts"), {
        user: user.username,
        avatar: user.avatar,
        text,
        image: null,
        likes: [],
        comments: [],
        created: serverTimestamp()
      });
      postInput.value = "";
    });

    postImageBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", async () => {
      if (fileInput.files.length === 0) return;
      const file = fileInput.files[0];
      const storageRef = ref(storage, "posts/" + Date.now() + "-" + file.name);
      await uploadBytes(storageRef, file);
      const imageUrl = await getDownloadURL(storageRef);

      await addDoc(collection(db, "posts"), {
        user: user.username,
        avatar: user.avatar,
        text: postInput.value.trim(),
        image: imageUrl,
        likes: [],
        comments: [],
        created: serverTimestamp()
      });
      postInput.value = "";
      fileInput.value = "";
    });

    const q = query(collection(db, "posts"), orderBy("created", "desc"));
    onSnapshot(q, (snapshot) => {
      postsContainer.innerHTML = "";
      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const postId = docSnap.id;

        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `
          <img src="${data.avatar}" class="avatar">
          <div style="display:inline-block; margin-left:10px;">
            <b>${data.user}</b><br>
            ${data.text || ""}
            ${data.image ? `<br><img src="${data.image}" class="post-image">` : ""}
          </div>
          <div style="margin-top:10px;">
            ❤️ ${data.likes?.length || 0} | 💬 ${data.comments?.length || 0}
          </div>
        `;
        postsContainer.appendChild(div);
      });
    });

    // ================== PROFILE: Cambiar Avatar ==================
    document.getElementById("profileAvatar").src = user.avatar;
    document.getElementById("saveAvatar").addEventListener("click", async () => {
      const file = document.getElementById("avatarInput").files[0];
      if (!file) return;
      const storageRef = ref(storage, "avatars/" + user.username + "-" + file.name);
      await uploadBytes(storageRef, file);
      const newUrl = await getDownloadURL(storageRef);
      user.avatar = newUrl;
      document.getElementById("profileAvatar").src = newUrl;
      alert("Avatar actualizado");
    });

    // ================== NOTIFICATIONS ==================
    const notificationsList = document.getElementById("notificationsList");
    onSnapshot(collection(db, "notifications"), (snapshot) => {
      notificationsList.innerHTML = "";
      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        const div = document.createElement("div");
        div.innerText = data.message;
        notificationsList.appendChild(div);
      });
    });

    // ================== EXPLORE: Buscar usuarios ==================
    const searchInput = document.getElementById("searchUser");
    const searchResults = document.getElementById("searchResults");

    searchInput.addEventListener("input", async () => {
      const val = searchInput.value.trim();
      searchResults.innerHTML = "";
      if (!val) return;
      const q = query(collection(db, "users"), where("username", ">=", val), where("username", "<=", val + "\uf8ff"));
      const snap = await getDocs(q);
      snap.forEach(docSnap => {
        const data = docSnap.data();
        const div = document.createElement("div");
        div.innerHTML = `
          <b>${data.username}</b> <button>Seguir</button>
        `;
        div.querySelector("button").addEventListener("click", async () => {
          await addDoc(collection(db, "notifications"), {
            message: `${user.username} empezó a seguir a ${data.username}`,
            created: serverTimestamp()
          });
          alert("Ahora sigues a " + data.username);
        });
        searchResults.appendChild(div);
      });
    });
  </script>
</body>
</html>
