<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunetter</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #000; color: #fff; }
    .sidebar { width: 220px; background: #000; color: #fff; height: 100vh; float: left; border-right: 1px solid #222; padding: 20px; }
    .sidebar a { display: block; margin: 20px 0; color: #fff; text-decoration: none; font-size: 18px; }
    .main { margin-left: 240px; padding: 20px; }
    .post-box { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .post-box textarea { flex: 1; background: #000; border: none; border-bottom: 1px solid #333; color: #fff; padding: 10px; resize: none; }
    .post-box button { background: #1da1f2; border: none; padding: 8px 16px; border-radius: 20px; color: #fff; cursor: pointer; }
    .post { border-bottom: 1px solid #333; padding: 15px 0; display: flex; gap: 10px; }
    .post img { width: 40px; height: 40px; border-radius: 50%; }
    .post .user { font-weight: bold; margin-bottom: 5px; }
    /* Login/Register modal */
    #auth { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; }
    #auth form { background: #111; padding: 30px; border-radius: 10px; display: flex; flex-direction: column; gap: 15px; width: 300px; }
    #auth input { padding: 10px; border: none; border-radius: 5px; }
    #auth button { padding: 10px; background: #1da1f2; border: none; border-radius: 5px; color: #fff; cursor: pointer; }
  </style>
</head>
<body>

<div id="auth">
  <form id="registerForm">
    <h2>Registro</h2>
    <input type="text" id="regUsername" placeholder="Nombre de usuario" required />
    <input type="password" id="regPassword" placeholder="Contraseña" required />
    <button type="submit">Registrar</button>
    <button type="button" id="toLogin">Iniciar sesión</button>
  </form>

  <form id="loginForm" style="display:none;">
    <h2>Iniciar sesión</h2>
    <input type="text" id="loginUsername" placeholder="Nombre de usuario" required />
    <input type="password" id="loginPassword" placeholder="Contraseña" required />
    <button type="submit">Entrar</button>
    <button type="button" id="toRegister">Registrarse</button>
  </form>
</div>

<div class="sidebar" id="sidebar" style="display:none;">
  <a href="#">Home</a>
  <a href="#">Explore</a>
  <a href="#">Notifications</a>
  <a href="#">Profile</a>
  <a href="#" id="logoutBtn">Cerrar sesión</a>
</div>

<div class="main" id="main" style="display:none;">
  <div class="post-box">
    <img id="currentAvatar" src="" alt="avatar" />
    <textarea id="postText" placeholder="What's happening?"></textarea>
    <button id="postBtn">Post</button>
  </div>
  <div id="feed"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, getDoc, addDoc, onSnapshot, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBZvsL3zwUsHmTL0QZxQOkWF28_N2FR4L0",
    authDomain: "lunetter-55d46.firebaseapp.com",
    projectId: "lunetter-55d46",
    storageBucket: "lunetter-55d46.firebasestorage.app",
    messagingSenderId: "798507844928",
    appId: "1:798507844928:web:20e8a48a66a85ee6c6e6a5",
    measurementId: "G-46BL2MEZ68"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const authDiv = document.getElementById("auth");
  const regForm = document.getElementById("registerForm");
  const loginForm = document.getElementById("loginForm");
  const mainDiv = document.getElementById("main");
  const sidebar = document.getElementById("sidebar");
  const feed = document.getElementById("feed");
  const postBtn = document.getElementById("postBtn");
  const postText = document.getElementById("postText");
  const currentAvatar = document.getElementById("currentAvatar");

  function randomAvatar() {
    return `https://i.pravatar.cc/150?u=${Math.floor(Math.random()*10000)}`;
  }

  function saveSession(user) {
    localStorage.setItem("user", JSON.stringify(user));
  }
  function getSession() {
    return JSON.parse(localStorage.getItem("user"));
  }
  function clearSession() {
    localStorage.removeItem("user");
  }

  async function register(username, password) {
    const userRef = doc(db, "users", username);
    const snap = await getDoc(userRef);
    if (snap.exists()) {
      alert("Usuario ya existe");
      return null;
    }
    const avatar = randomAvatar();
    await setDoc(userRef, { username, password, avatar, createdAt: serverTimestamp() });
    return { username, avatar };
  }

  async function login(username, password) {
    const userRef = doc(db, "users", username);
    const snap = await getDoc(userRef);
    if (!snap.exists()) {
      alert("Usuario no encontrado");
      return null;
    }
    const data = snap.data();
    if (data.password !== password) {
      alert("Contraseña incorrecta");
      return null;
    }
    return { username: data.username, avatar: data.avatar };
  }

  function showApp(user) {
    authDiv.style.display = "none";
    mainDiv.style.display = "block";
    sidebar.style.display = "block";
    currentAvatar.src = user.avatar;
    saveSession(user);
    loadPosts();
  }

  function renderPost(docSnap) {
    const data = docSnap.data();
    const div = document.createElement("div");
    div.className = "post";
    div.innerHTML = `
      <img src="${data.avatar}" />
      <div>
        <div class="user">${data.user}</div>
        <div>${data.text}</div>
      </div>
    `;
    return div;
  }

  function loadPosts() {
    const q = query(collection(db, "posts"), orderBy("created", "desc"));
    onSnapshot(q, (snapshot) => {
      feed.innerHTML = "";
      snapshot.forEach((docSnap) => {
        feed.appendChild(renderPost(docSnap));
      });
    });
  }

  // EVENTOS
  regForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = document.getElementById("regUsername").value.trim();
    const password = document.getElementById("regPassword").value;
    const user = await register(username, password);
    if (user) showApp(user);
  });

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;
    const user = await login(username, password);
    if (user) showApp(user);
  });

  document.getElementById("toLogin").addEventListener("click", () => {
    regForm.style.display = "none";
    loginForm.style.display = "flex";
  });

  document.getElementById("toRegister").addEventListener("click", () => {
    loginForm.style.display = "none";
    regForm.style.display = "flex";
  });

  postBtn.addEventListener("click", async () => {
    const user = getSession();
    if (!user) return;
    const text = postText.value.trim();
    if (text === "") return;
    await addDoc(collection(db, "posts"), {
      user: user.username,
      avatar: user.avatar,
      text,
      created: serverTimestamp()
    });
    postText.value = "";
  });

  document.getElementById("logoutBtn").addEventListener("click", () => {
    clearSession();
    location.reload();
  });

  // Mantener sesión
  const sessionUser = getSession();
  if (sessionUser) {
    showApp(sessionUser);
  }
</script>
</body>
</html>
