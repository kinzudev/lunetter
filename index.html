<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pekora Forum</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #000;
      color: #e6e6e6;
      display: flex;
    }
    .sidebar {
      width: 240px;
      background: #111;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      height: 100vh;
      border-right: 1px solid #333;
    }
    .sidebar button {
      background: none;
      border: none;
      color: white;
      font-size: 18px;
      text-align: left;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .sidebar button:hover, .sidebar button.active {
      background: #1d9bf0;
    }
    .content {
      flex: 1;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .hidden {
      display: none;
    }
    .post-box {
      background: #111;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 20px;
    }
    .post-box textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: white;
      font-size: 16px;
      resize: none;
      outline: none;
    }
    .post-box button {
      margin-top: 10px;
      background: #1d9bf0;
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
    }
    .post {
      background: #111;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 15px;
    }
    .post img.avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      vertical-align: middle;
    }
    .post .username {
      font-weight: bold;
      margin-left: 10px;
      color: #fff;
    }
    .post .text {
      margin-top: 10px;
      font-size: 15px;
    }
    .post img.post-image {
      max-width: 100%;
      border-radius: 15px;
      margin-top: 10px;
    }
    .post .actions {
      margin-top: 10px;
      font-size: 14px;
      display: flex;
      gap: 15px;
      color: #aaa;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <button data-section="home" class="active">🏠 Home</button>
    <button data-section="profile">👤 Profile</button>
    <button data-section="notifications">🔔 Notifications</button>
    <button data-section="explore">🔎 Explore</button>
  </div>

  <!-- Contenido -->
  <div class="content">
    <!-- HOME -->
    <div id="home" class="section">
      <div class="post-box">
        <textarea id="postInput" rows="3" placeholder="¿Qué está pasando?"></textarea>
        <div>
          <button id="postBtn">Post</button>
          <button id="postImageBtn">📷 Imagen</button>
          <input type="file" id="fileInput" accept="image/*" hidden>
        </div>
      </div>
      <div id="posts"></div>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="section hidden">
      <h2>Mi Perfil</h2>
      <img id="profileAvatar" class="avatar"><br><br>
      <input type="file" id="avatarInput" accept="image/*">
      <button id="saveAvatar">Guardar Avatar</button>
    </div>

    <!-- NOTIFICATIONS -->
    <div id="notifications" class="section hidden">
      <h2>Notificaciones</h2>
      <div id="notificationsList"></div>
    </div>

    <!-- EXPLORE -->
    <div id="explore" class="section hidden">
      <h2>Explorar</h2>
      <input type="text" id="searchUser" placeholder="Buscar usuario...">
      <div id="searchResults"></div>
    </div>
  </div>

  <!-- Script -->
  <script type="module">
    // Cambiar entre secciones
    const buttons = document.querySelectorAll(".sidebar button");
    const sections = document.querySelectorAll(".section");

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        // remover active
        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        // ocultar todas las secciones
        sections.forEach(s => s.classList.add("hidden"));
        document.getElementById(btn.dataset.section).classList.remove("hidden");
      });
    });

    // Simulación de usuario
    let user = {
      username: "UsuarioDemo",
      avatar: "https://i.pravatar.cc/150"
    };

    document.getElementById("profileAvatar").src = user.avatar;

    // Simulación de posts en memoria
    const postsContainer = document.getElementById("posts");
    const postBtn = document.getElementById("postBtn");
    const postImageBtn = document.getElementById("postImageBtn");
    const fileInput = document.getElementById("fileInput");
    const postInput = document.getElementById("postInput");

    let posts = [];

    function renderPosts() {
      postsContainer.innerHTML = "";
      posts.forEach(p => {
        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `
          <img src="${p.avatar}" class="avatar">
          <span class="username">${p.user}</span>
          <div class="text">${p.text}</div>
          ${p.image ? `<img src="${p.image}" class="post-image">` : ""}
          <div class="actions">
            ❤️ ${p.likes} &nbsp; 💬 ${p.comments.length}
          </div>
        `;
        postsContainer.appendChild(div);
      });
    }

    postBtn.addEventListener("click", () => {
      if (!postInput.value.trim()) return;
      posts.unshift({
        user: user.username,
        avatar: user.avatar,
        text: postInput.value,
        image: null,
        likes: 0,
        comments: []
      });
      postInput.value = "";
      renderPosts();
    });

    postImageBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => {
      if (fileInput.files.length === 0) return;
      const reader = new FileReader();
      reader.onload = () => {
        posts.unshift({
          user: user.username,
          avatar: user.avatar,
          text: postInput.value,
          image: reader.result,
          likes: 0,
          comments: []
        });
        postInput.value = "";
        fileInput.value = "";
        renderPosts();
      };
      reader.readAsDataURL(fileInput.files[0]);
    });

    renderPosts();
  </script>
</body>
</html>
