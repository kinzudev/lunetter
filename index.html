<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pekora Forum</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #e6e6e6;
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex;
    }
    .sidebar {
      width: 250px;
      background: #111;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 25px;
      height: 100vh;
      border-right: 1px solid #333;
    }
    .sidebar button {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      font-weight: bold;
      text-align: left;
      cursor: pointer;
      padding: 10px;
      border-radius: 10px;
      transition: background 0.2s;
    }
    .sidebar button:hover {
      background: #222;
    }
    .content {
      flex: 1;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .hidden {
      display: none;
    }
    .post-box {
      background: #111;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 20px;
    }
    .post-box textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: white;
      font-size: 16px;
      resize: none;
      outline: none;
    }
    .post-box button {
      margin-top: 10px;
      background: #1d9bf0;
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
    }
    .post {
      background: #111;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 15px;
    }
    .post img.avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      vertical-align: middle;
    }
    .post .username {
      font-weight: bold;
      margin-left: 10px;
      color: #fff;
    }
    .post .text {
      margin-top: 10px;
      font-size: 15px;
    }
    .post img.post-image {
      max-width: 100%;
      border-radius: 15px;
      margin-top: 10px;
    }
    .post .actions {
      margin-top: 10px;
      font-size: 14px;
      display: flex;
      gap: 15px;
      color: #aaa;
      cursor: pointer;
    }
    .comment-box {
      margin-top: 10px;
      display: none;
    }
    .comment-box input {
      width: 70%;
      padding: 5px;
      border-radius: 10px;
      border: none;
      outline: none;
    }
    .comment-box button {
      margin-left: 5px;
      background: #1d9bf0;
      border: none;
      color: white;
      padding: 5px 10px;
      border-radius: 10px;
      cursor: pointer;
    }
    .comment-list {
      margin-top: 10px;
      font-size: 14px;
    }
    .comment-list p {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <!-- Menú lateral -->
  <div class="sidebar">
    <button id="btnHome">🏠 Home</button>
    <button id="btnProfile">👤 Profile</button>
    <button id="btnNotifications">🔔 Notifications</button>
    <button id="btnExplore">🔎 Explore</button>
  </div>

  <!-- Contenido -->
  <div class="content">
    <!-- Home -->
    <div id="homeSection">
      <div class="post-box">
        <textarea id="postInput" rows="3" placeholder="¿Qué está pasando?"></textarea>
        <div>
          <button id="postBtn">Post</button>
          <button id="postImageBtn">📷 Imagen</button>
          <input type="file" id="fileInput" accept="image/*" hidden>
        </div>
      </div>
      <div id="posts"></div>
    </div>

    <!-- Profile -->
    <div id="profileSection" class="hidden">
      <h2>Mi Perfil</h2>
      <img id="profileAvatar" class="avatar"><br><br>
      <input type="file" id="avatarInput" accept="image/*">
      <button id="saveAvatar">Guardar Avatar</button>
    </div>

    <!-- Notifications -->
    <div id="notificationsSection" class="hidden">
      <h2>Notificaciones</h2>
      <div id="notificationsList"></div>
    </div>

    <!-- Explore -->
    <div id="exploreSection" class="hidden">
      <h2>Explorar</h2>
      <input type="text" id="searchUser" placeholder="Buscar usuario...">
      <div id="searchResults"></div>
    </div>
  </div>

  <!-- SCRIPT -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { 
      getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, 
      updateDoc, doc, arrayUnion, arrayRemove, getDocs, where 
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    // === Configuración Firebase ===
    const firebaseConfig = {
      apiKey: "AIzaSyBwj_as6pb5Bg81F9Cl9VWTKkekMM9Exfk",
      authDomain: "pekora-forum.firebaseapp.com",
      projectId: "pekora-forum",
      storageBucket: "pekora-forum.firebasestorage.app",
      messagingSenderId: "161910967859",
      appId: "1:161910967859:web:6a28cecaae74b9b7e9dd46",
      measurementId: "G-BPBTW5KBRK"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // Usuario simulado
    let user = {
      username: "lunetter",
      avatar: "https://i.pravatar.cc/150"
    };

    // === Navegación ===
    const sections = {
      home: document.getElementById("homeSection"),
      profile: document.getElementById("profileSection"),
      notifications: document.getElementById("notificationsSection"),
      explore: document.getElementById("exploreSection")
    };

    function showSection(name) {
      Object.values(sections).forEach(s => s.classList.add("hidden"));
      sections[name].classList.remove("hidden");
    }

    document.getElementById("btnHome").onclick = () => showSection("home");
    document.getElementById("btnProfile").onclick = () => showSection("profile");
    document.getElementById("btnNotifications").onclick = () => showSection("notifications");
    document.getElementById("btnExplore").onclick = () => showSection("explore");

    // === HOME: Postear ===
    const postsContainer = document.getElementById("posts");
    const postBtn = document.getElementById("postBtn");
    const postImageBtn = document.getElementById("postImageBtn");
    const postInput = document.getElementById("postInput");
    const fileInput = document.getElementById("fileInput");

    postBtn.addEventListener("click", async () => {
      const text = postInput.value.trim();
      if (!text) return;
      await addDoc(collection(db, "posts"), {
        user: user.username,
        avatar: user.avatar,
        text,
        image: null,
        likes: [],
        comments: [],
        created: serverTimestamp()
      });
      postInput.value = "";
    });

    postImageBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", async () => {
      if (fileInput.files.length === 0) return;
      const file = fileInput.files[0];
      const storageRef = ref(storage, "posts/" + Date.now() + "-" + file.name);
      await uploadBytes(storageRef, file);
      const imageUrl = await getDownloadURL(storageRef);

      await addDoc(collection(db, "posts"), {
        user: user.username,
        avatar: user.avatar,
        text: postInput.value.trim(),
        image: imageUrl,
        likes: [],
        comments: [],
        created: serverTimestamp()
      });

      postInput.value = "";
      fileInput.value = "";
    });

    const q = query(collection(db, "posts"), orderBy("created", "desc"));
    onSnapshot(q, (snapshot) => {
      postsContainer.innerHTML = "";
      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const postId = docSnap.id;

        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `
          <img src="${data.avatar}" class="avatar">
          <span class="username">${data.user}</span>
          <div class="text">${data.text || ""}</div>
          ${data.image ? `<img src="${data.image}" class="post-image">` : ""}
          <div class="actions">
            <span class="like-btn">❤️ ${data.likes?.length || 0}</span>
            <span class="comment-toggle">💬 ${data.comments?.length || 0}</span>
          </div>
          <div class="comment-box">
            <div class="comment-list">
              ${data.comments?.map(c => `<p><b>${c.user}:</b> ${c.text}</p>`).join("") || ""}
            </div>
            <input type="text" placeholder="Escribe un comentario..." class="comment-input">
            <button class="send-comment">Enviar</button>
          </div>
        `;

        // Like con notificación
        div.querySelector(".like-btn").addEventListener("click", async () => {
          const postRef = doc(db, "posts", postId);
          if (data.likes?.includes(user.username)) {
            await updateDoc(postRef, { likes: arrayRemove(user.username) });
          } else {
            await updateDoc(postRef, { likes: arrayUnion(user.username) });
            if (data.user !== user.username) {
              await addDoc(collection(db, "notifications"), {
                message: `${user.username} le dio like a una publicación de ${data.user}`,
                created: serverTimestamp()
              });
            }
          }
        });

        // Toggle comentarios
        div.querySelector(".comment-toggle").addEventListener("click", () => {
          const commentsDiv = div.querySelector(".comment-box");
          commentsDiv.style.display = commentsDiv.style.display === "none" ? "block" : "none";
        });

        // Enviar comentario
        div.querySelector(".send-comment").addEventListener("click", async () => {
          const input = div.querySelector(".comment-input");
          const text = input.value.trim();
          if (!text) return;
          const postRef = doc(db, "posts", postId);
          await updateDoc(postRef, {
            comments: arrayUnion({ user: user.username, text })
          });
          if (data.user !== user.username) {
            await addDoc(collection(db, "notifications"), {
              message: `${user.username} comentó en una publicación de ${data.user}`,
              created: serverTimestamp()
            });
          }
          input.value = "";
        });

        postsContainer.appendChild(div);
      });
    });

    // === PROFILE: Cambiar avatar ===
    document.getElementById("profileAvatar").src = user.avatar;
    document.getElementById("saveAvatar").addEventListener("click", async () => {
      const file = document.getElementById("avatarInput").files[0];
      if (!file) return;
      const storageRef = ref(storage, "avatars/" + user.username + "-" + file.name);
      await uploadBytes(storageRef, file);
      const newUrl = await getDownloadURL(storageRef);
      user.avatar = newUrl;
      document.getElementById("profileAvatar").src = newUrl;
      alert("Avatar actualizado");
    });

    // === NOTIFICATIONS ===
    const notificationsList = document.getElementById("notificationsList");
    onSnapshot(collection(db, "notifications"), (snapshot) => {
      notificationsList.innerHTML = "";
      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        const div = document.createElement("div");
        div.innerText = data.message;
        notificationsList.appendChild(div);
      });
    });

    // === EXPLORE: Buscar usuarios ===
    const searchInput = document.getElementById("searchUser");
    const searchResults = document.getElementById("searchResults");

    searchInput.addEventListener("input", async () => {
      const val = searchInput.value.trim();
      searchResults.innerHTML = "";
      if (!val) return;
      const q = query(collection(db, "users"), where("username", ">=", val), where("username", "<=", val + "\uf8ff"));
      const snap = await getDocs(q);
      snap.forEach(docSnap => {
        const data = docSnap.data();
        const div = document.createElement("div");
        div.innerHTML = `
          <b>${data.username}</b> <button>Seguir</button>
        `;
        div.querySelector("button").addEventListener("click", async () => {
          await addDoc(collection(db, "notifications"), {
            message: `${user.username} empezó a seguir a ${data.username}`,
            created: serverTimestamp()
          });
          alert("Ahora sigues a " + data.username);
        });
        searchResults.appendChild(div);
      });
    });
  </script>
</body>
</html>
