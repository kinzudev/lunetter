<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pekora Forum</title>
  <script type="module" src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js"></script>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 600px;
    }
    .post-box {
      display: flex;
      gap: 10px;
      padding: 10px;
      border-bottom: 1px solid #222;
    }
    .post-box img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
    .post-box textarea {
      flex: 1;
      background: #000;
      border: none;
      color: #fff;
      resize: none;
      font-size: 16px;
    }
    .post-box button {
      background: #1d9bf0;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 6px 14px;
      cursor: pointer;
    }
    .post {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid #222;
    }
    .post img.avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
    }
    .post-content {
      flex: 1;
    }
    .post-header {
      font-weight: bold;
      margin-bottom: 4px;
    }
    .post-text {
      margin-bottom: 8px;
      white-space: pre-wrap;
    }
    .post img.post-image {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 8px;
    }
    .post-actions {
      display: flex;
      gap: 30px;
      margin-top: 6px;
      font-size: 14px;
      color: #8899a6;
      cursor: pointer;
    }
    .post-actions span:hover {
      color: #1d9bf0;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Caja para publicar -->
    <div class="post-box">
      <img src="https://i.pravatar.cc/50" id="userAvatar">
      <textarea id="postInput" rows="2" placeholder="¿Qué está pasando?"></textarea>
      <button id="postBtn">Post</button>
      <button id="postImageBtn">Post Image</button>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>

    <!-- Lista de posts -->
    <div id="posts"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    // === Config Firebase ===
    const firebaseConfig = {
      apiKey: "AIzaSyBwj_as6pb5Bg81F9Cl9VWTKkekMM9Exfk",
      authDomain: "pekora-forum.firebaseapp.com",
      projectId: "pekora-forum",
      storageBucket: "pekora-forum.firebasestorage.app",
      messagingSenderId: "161910967859",
      appId: "1:161910967859:web:6a28cecaae74b9b7e9dd46",
      measurementId: "G-BPBTW5KBRK"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const postsContainer = document.getElementById("posts");
    const postBtn = document.getElementById("postBtn");
    const postImageBtn = document.getElementById("postImageBtn");
    const postInput = document.getElementById("postInput");
    const fileInput = document.getElementById("fileInput");

    // Usuario simulado (reemplazar por auth)
    const user = {
      username: "lunetter",
      avatar: "https://i.pravatar.cc/150"
    };

    // === Publicar texto ===
    postBtn.addEventListener("click", async () => {
      const text = postInput.value.trim();
      if (!text) return;

      await addDoc(collection(db, "posts"), {
        user: user.username,
        avatar: user.avatar,
        text,
        image: null,
        created: serverTimestamp()
      });

      postInput.value = "";
    });

    // === Publicar imagen ===
    postImageBtn.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", async () => {
      if (fileInput.files.length === 0) return;
      const file = fileInput.files[0];
      const storageRef = ref(storage, "posts/" + Date.now() + "-" + file.name);
      await uploadBytes(storageRef, file);
      const imageUrl = await getDownloadURL(storageRef);

      await addDoc(collection(db, "posts"), {
        user: user.username,
        avatar: user.avatar,
        text: postInput.value.trim(),
        image: imageUrl,
        created: serverTimestamp()
      });

      postInput.value = "";
      fileInput.value = "";
    });

    // === Mostrar posts en tiempo real ===
    const q = query(collection(db, "posts"), orderBy("created", "desc"));
    onSnapshot(q, (snapshot) => {
      postsContainer.innerHTML = "";
      snapshot.forEach((doc) => {
        const data = doc.data();
        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `
          <img src="${data.avatar}" class="avatar">
          <div class="post-content">
            <div class="post-header">${data.user}</div>
            <div class="post-text">${data.text || ""}</div>
            ${data.image ? `<img src="${data.image}" class="post-image">` : ""}
            <div class="post-actions">
              <span>💬 0</span>
              <span>❤️ 0</span>
            </div>
          </div>
        `;
        postsContainer.appendChild(div);
      });
    });
  </script>
</body>
</html>
