<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>lunetter</title>
  <!-- Tailwind CDN (for quick prototyping) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>body{font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,-apple-system,"Helvetica Neue",Arial}</style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-4xl mx-auto p-4">
    <header class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-extrabold">lunetter</h1>
      <div id="auth-area" class="flex items-center gap-3">
        <!-- Auth UI injected here -->
      </div>
    </header>

    <main class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <!-- Left: Profile / Login -->
      <section class="md:col-span-1 bg-white rounded-2xl p-4 shadow-sm">
        <div id="profile-card" class="flex flex-col items-center gap-3">
          <!-- profile content injected -->
        </div>
      </section>

      <!-- Center: Post composer + feed -->
      <section class="md:col-span-2">
        <div id="composer" class="bg-white rounded-2xl p-4 mb-6 shadow-sm">
          <!-- composer UI injected -->
        </div>

        <div id="feed" class="space-y-4">
          <!-- posts injected here -->
        </div>
      </section>
    </main>

    <footer class="mt-8 text-center text-sm text-gray-500">Bienvenidos a lunetter :D <code>Echo por @KinzuDev Y </code>@Zunex</footer>
  </div>

  <!-- Firebase v9 compat CDN -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

  <script>
  // ---------- CONFIG ----------
  const firebaseConfig = {
    apiKey: "AIzaSyBwj_as6pb5Bg81F9Cl9VWTKkekMM9Exfk",
    authDomain: "pekora-forum.firebaseapp.com",
    projectId: "pekora-forum",
    storageBucket: "pekora-forum.firebasestorage.app",
    messagingSenderId: "161910967859",
    appId: "1:161910967859:web:6a28cecaae74b9b7e9dd46",
    measurementId: "G-BPBTW5KBRK"
  };
  // ----------------------------

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // Helpers
  const $ = (sel) => document.querySelector(sel);
  const createEl = (tag, attrs = {}, text = '') => {
    const el = document.createElement(tag);
    Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
    if (text) el.textContent = text;
    return el;
  };

  // ---------- UI ----------
  function renderAuthArea(user){
    const container = $('#auth-area');
    container.innerHTML = '';
    if(user){
      const avatar = createEl('img', {src: user.photoURL||'https://ui-avatars.com/api/?name='+encodeURIComponent(user.displayName||user.email), class:'w-10 h-10 rounded-full object-cover'});
      const btnLogout = createEl('button', {class:'ml-2 px-3 py-1 bg-red-500 text-white rounded'}, 'Salir');
      btnLogout.onclick = ()=> auth.signOut();
      container.appendChild(avatar);
      container.appendChild(btnLogout);
    } else {
      const btnLogin = createEl('button', {class:'px-3 py-1 bg-blue-600 text-white rounded'}, 'Ingresar / Registrarse');
      btnLogin.onclick = ()=> openAuthModal();
      container.appendChild(btnLogin);
    }
  }

  function openAuthModal(){
    const mode = prompt('Escribe "r" para registrarte o "l" para iniciar sesión (r/l)');
    if(!mode) return;
    if(mode.toLowerCase() === 'r'){
      const email = prompt('Email');
      const password = prompt('Contraseña (mín 6 caracteres)');
      const displayName = prompt('Nombre público (visible)');
      if(!email||!password) return alert('Email y password requeridos');
      auth.createUserWithEmailAndPassword(email, password)
      .then(({user})=> user.updateProfile({displayName: displayName || null}))
      .then(()=> alert('Registrado correctamente'))
      .catch(err=> alert('Error: '+err.message));
    } else {
      const email = prompt('Email');
      const password = prompt('Contraseña');
      if(!email||!password) return alert('Email y password requeridos');
      auth.signInWithEmailAndPassword(email, password).catch(err=> alert('Error: '+err.message));
    }
  }

  function renderProfileCard(userData){
    const c = $('#profile-card');
    c.innerHTML = '';
    if(!userData){
      c.innerHTML = `<div class="text-center">No hay usuario autenticado.<div class="mt-3"><button id=btn-open-auth class="px-3 py-1 bg-blue-600 text-white rounded">Iniciar / Registrar</button></div></div>`;
      $('#btn-open-auth').onclick = openAuthModal;
      return;
    }

    const img = createEl('img', {src: userData.photoURL||'https://ui-avatars.com/api/?name='+encodeURIComponent(userData.displayName||userData.email), class:'w-24 h-24 rounded-full object-cover'});
    const name = createEl('h3', {class:'text-lg font-semibold'}, userData.displayName || userData.email);
    const email = createEl('p', {class:'text-sm text-gray-500'}, userData.email);
    const editBtn = createEl('button', {class:'mt-3 px-3 py-1 bg-indigo-600 text-white rounded'}, 'Editar perfil');
    editBtn.onclick = ()=> openEditProfile(userData);

    c.appendChild(img);
    c.appendChild(name);
    c.appendChild(email);
    c.appendChild(editBtn);
  }

  function openEditProfile(userData){
    const name = prompt('Nombre público', userData.displayName||'');
    const photo = prompt('URL de foto de perfil (dejar vacío para mantener)');
    if(name !== null){
      auth.currentUser.updateProfile({displayName: name, photoURL: photo || userData.photoURL || null}).then(()=>{
        const u = auth.currentUser;
        db.collection('users').doc(u.uid).set({displayName: u.displayName, photoURL: u.photoURL, updatedAt: firebase.firestore.FieldValue.serverTimestamp()}, {merge:true});
        alert('Perfil actualizado');
      }).catch(e=> alert('Error: '+e.message));
    }
  }

  function renderComposer(userData){
    const c = $('#composer');
    c.innerHTML = '';
    if(!userData){
      c.innerHTML = '<div class="text-center py-6 text-gray-500">Inicia sesión para publicar.</div>';
      return;
    }

    const form = document.createElement('form');
    form.className = 'space-y-3';

    const textarea = createEl('textarea', {placeholder:'¿Qué está pasando? (max 280 caracteres)', maxlength:280, class:'w-full border rounded p-3 min-h-[80px] resize-none'});

    // Nuevo input de URL en lugar de archivo
    const urlInput = createEl('input', {type:'text', id:'imageUrlInput', placeholder:'Pega aquí la URL de una imagen (opcional)', class:'w-full border rounded p-2'});

    const submit = createEl('button', {class:'px-4 py-2 bg-green-600 text-white rounded'}, 'Publicar');

    form.appendChild(textarea);
    form.appendChild(urlInput);
    form.appendChild(submit);

    form.onsubmit = async (e)=>{
      e.preventDefault();
      submit.disabled = true;
      const text = textarea.value.trim();
      const imageUrl = urlInput.value.trim() || null;
      try{
        const post = {
          uid: auth.currentUser.uid,
          text: text || null,
          imageUrl: imageUrl,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          likes: 0
        };
        await db.collection('posts').add(post);
        textarea.value = '';
        urlInput.value = '';
      }catch(err){
        alert('Error publicando: '+err.message);
      }finally{ submit.disabled = false; }
    };

    c.appendChild(form);
  }

  function renderPost(doc, userId){
    const data = doc.data();
    const container = createEl('article', {class:'bg-white p-4 rounded-2xl shadow-sm'});
    const header = createEl('div', {class:'flex items-center gap-3 mb-3'});
    const avatar = createEl('img', {src:'https://ui-avatars.com/api/?name=...', class:'w-12 h-12 rounded-full object-cover'});
    const meta = createEl('div');
    const authorName = createEl('div', {class:'font-semibold'}, 'Cargando...');
    const time = createEl('div', {class:'text-xs text-gray-400'}, '');
    meta.appendChild(authorName); meta.appendChild(time);
    header.appendChild(avatar); header.appendChild(meta);

    const body = createEl('div', {class:'mt-2'});
    if(data.text) body.appendChild(createEl('p', {class:'whitespace-pre-wrap'}, data.text));
    if(data.imageUrl) body.appendChild(createEl('img', {src:data.imageUrl, class:'mt-3 max-h-96 w-full object-cover rounded'}));

    const actions = createEl('div', {class:'mt-3 flex items-center gap-3 text-sm text-gray-600'});
    const likeBtn = createEl('button', {class:'flex items-center gap-2 px-2 py-1 rounded'}, `❤ ${data.likes||0}`);
    likeBtn.onclick = async ()=>{
      const postRef = db.collection('posts').doc(doc.id);
      await postRef.update({likes: firebase.firestore.FieldValue.increment(1)});
    };
    actions.appendChild(likeBtn);

    if(userId === data.uid){
      const del = createEl('button', {class:'px-2 py-1 bg-red-100 rounded text-red-600'}, 'Eliminar');
      del.onclick = async ()=>{
        if(!confirm('Borrar publicación?')) return;
        try{
          await db.collection('posts').doc(doc.id).delete();
        }catch(e){ alert('Error: '+e.message); }
      };
      actions.appendChild(del);
    }

    container.appendChild(header);
    container.appendChild(body);
    container.appendChild(actions);

    db.collection('users').doc(data.uid).get().then(snap=>{
      const u = snap.exists ? snap.data() : null;
      if(u){
        avatar.src = u.photoURL || ('https://ui-avatars.com/api/?name='+encodeURIComponent(u.displayName||'User'));
        authorName.textContent = u.displayName || 'Usuario';
      } else {
        authorName.textContent = 'Usuario';
      }
    }).catch(()=>{});

    if(data.createdAt && data.createdAt.toDate){
      time.textContent = timeAgo(data.createdAt.toDate());
    }

    return container;
  }

  function timeAgo(date){
    const s = Math.floor((Date.now() - date.getTime())/1000);
    if(s < 60) return s + 's';
    const m = Math.floor(s/60); if(m < 60) return m + 'm';
    const h = Math.floor(m/60); if(h < 24) return h + 'h';
    const d = Math.floor(h/24); return d + 'd';
  }

  let unsubscribeFeed = null;
  function subscribeFeed(){
    if(unsubscribeFeed) unsubscribeFeed();
    unsubscribeFeed = db.collection('posts').orderBy('createdAt', 'desc').limit(50).onSnapshot(snapshot=>{
      const feed = $('#feed');
      feed.innerHTML = '';
      snapshot.forEach(doc=>{
        feed.appendChild(renderPost(doc, auth.currentUser ? auth.currentUser.uid : null));
      });
    }, err=> console.error('feed err', err));
  }

  auth.onAuthStateChanged(async user=>{
    renderAuthArea(user);
    if(user){
      const uRef = db.collection('users').doc(user.uid);
      await uRef.set({displayName: user.displayName || null, email: user.email || null, photoURL: user.photoURL || null, lastSeen: firebase.firestore.FieldValue.serverTimestamp()}, {merge:true});
      const snap = await uRef.get();
      renderProfileCard({...user, ...(snap.exists ? snap.data() : {})});
      renderComposer(user);
    } else {
      renderProfileCard(null);
      renderComposer(null);
    }
    subscribeFeed();
  });

  subscribeFeed();
  </script>
  
<script>
document.addEventListener("DOMContentLoaded", () => {
  const ADMIN_EMAIL = "kinzudev@gmail.com";
  const VERIFIED_ICON = "https://img.icons8.com/?size=512&id=2sZ0sdlG9kWP&format=png";

  // Crear panel admin oculto (si no existe)
  if (!document.getElementById('admin-panel')) {
    const panel = document.createElement("div");
    panel.id = "admin-panel";
    panel.style.display = "none";
    panel.style.position = "fixed";
    panel.style.top = "3rem";
    panel.style.right = "1rem";
    panel.style.zIndex = 9999;
    panel.style.width = "320px";
    panel.style.background = "#fff";
    panel.style.boxShadow = "0 8px 30px rgba(2,6,23,0.2)";
    panel.style.padding = "16px";
    panel.style.borderRadius = "12px";
    panel.innerHTML = `
      <h3 style="font-weight:700;margin:0 0 8px 0;">Panel Admin</h3>
      <input id="verify-email" type="text" placeholder="Email del usuario" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;margin-bottom:8px;">
      <div style="display:flex;gap:8px;">
        <button id="btn-verify" style="flex:1;padding:8px;background:#0ea5e9;color:#fff;border-radius:6px;border:none;cursor:pointer;">Añadir verificado</button>
        <button id="btn-unverify" style="flex:1;padding:8px;background:#94a3b8;color:#fff;border-radius:6px;border:none;cursor:pointer;">Quitar verificado</button>
      </div>
      <div style="height:8px"></div>
      <div style="display:flex;gap:8px;">
        <button id="btn-ban" style="flex:1;padding:8px;background:#ef4444;color:#fff;border-radius:6px;border:none;cursor:pointer;">Banear</button>
        <button id="btn-unban" style="flex:1;padding:8px;background:#10b981;color:#fff;border-radius:6px;border:none;cursor:pointer;">Desbanear</button>
      </div>
      <div style="height:8px"></div>
      <div id="admin-msg" style="font-size:13px;color:#334155;margin-top:8px;min-height:18px;"></div>
    `;
    document.body.appendChild(panel);
  }

  const panelEl = document.getElementById("admin-panel");
  const msgEl = document.getElementById("admin-msg");
  const setMsg = (t, ok=true) => { msgEl.textContent = t; msgEl.style.color = ok ? "#0f172a" : "#b91c1c"; };

  // abrir/cerrar panel con tecla Insert solo si el admin está logueado
  document.addEventListener("keydown", (e) => {
    try {
      if (e.key === "Insert" && auth.currentUser && auth.currentUser.email === ADMIN_EMAIL) {
        panelEl.style.display = panelEl.style.display === "none" ? "block" : "none";
      }
    } catch (err) { /* silencio */ }
  });

  // helper: buscar usuario por email en collection 'users'
  async function findUserByEmail(email) {
    const q = await db.collection("users").where("email", "==", email).get();
    if (q.empty) return null;
    return { id: q.docs[0].id, data: q.docs[0].data() };
  }

  // Añadir verificado
  document.getElementById("btn-verify").onclick = async () => {
    const email = document.getElementById("verify-email").value.trim();
    if (!email) return setMsg("Ingresa un email.", false);
    setMsg("Buscando usuario...");
    try {
      const user = await findUserByEmail(email);
      if (!user) return setMsg("Usuario no encontrado.", false);
      await db.collection("users").doc(user.id).set({ verified: true }, { merge: true });
      setMsg("Usuario verificado ✅");
      // refrescar feed (forzar re-render)
      if (typeof subscribeFeed === "function") subscribeFeed();
    } catch (err) {
      setMsg("Error: " + err.message, false);
    }
  };

  // Quitar verificado
  document.getElementById("btn-unverify").onclick = async () => {
    const email = document.getElementById("verify-email").value.trim();
    if (!email) return setMsg("Ingresa un email.", false);
    setMsg("Buscando usuario...");
    try {
      const user = await findUserByEmail(email);
      if (!user) return setMsg("Usuario no encontrado.", false);
      await db.collection("users").doc(user.id).set({ verified: false }, { merge: true });
      setMsg("Verificado removido ✅");
      if (typeof subscribeFeed === "function") subscribeFeed();
    } catch (err) {
      setMsg("Error: " + err.message, false);
    }
  };

  // Banear usuario (set banned: true)
  document.getElementById("btn-ban").onclick = async () => {
    const email = document.getElementById("verify-email").value.trim();
    if (!email) return setMsg("Ingresa un email.", false);
    setMsg("Buscando usuario...");
    try {
      const user = await findUserByEmail(email);
      if (!user) return setMsg("Usuario no encontrado.", false);
      await db.collection("users").doc(user.id).set({ banned: true }, { merge: true });
      setMsg("Usuario baneado ⛔");
      // opcional: cerrar sesión si el usuario está actualmente logueado en este navegador
      if (auth.currentUser && auth.currentUser.email === email) {
        await auth.signOut();
      }
      if (typeof subscribeFeed === "function") subscribeFeed();
    } catch (err) {
      setMsg("Error: " + err.message, false);
    }
  };

  // Desbanear usuario (set banned: false)
  document.getElementById("btn-unban").onclick = async () => {
    const email = document.getElementById("verify-email").value.trim();
    if (!email) return setMsg("Ingresa un email.", false);
    setMsg("Buscando usuario...");
    try {
      const user = await findUserByEmail(email);
      if (!user) return setMsg("Usuario no encontrado.", false);
      await db.collection("users").doc(user.id).set({ banned: false }, { merge: true });
      setMsg("Usuario desbaneado ✅");
      if (typeof subscribeFeed === "function") subscribeFeed();
    } catch (err) {
      setMsg("Error: " + err.message, false);
    }
  };

  // Detectar en el onAuthStateChanged si el usuario está baneado:
  // añadimos un pequeño wrapper si el proyecto no lo tiene ya (intento no romper nada).
  if (typeof auth !== "undefined") {
    // Guardar referencia al observer original si existe (no sobrescribimos)
    const originalOnAuth = auth.onAuthStateChanged.bind(auth);
    // Re-registrar una función que chequea ban y luego llame a las funciones existentes ya en tu proyecto
    // (Nota: si ya tienes una onAuthStateChanged en tu HTML, esta funcion se ejecutará también; aquí solo añadimos verificación adicional)
    originalOnAuth(async (user) => {
      if (user) {
        try {
          const snap = await db.collection("users").doc(user.uid).get();
          if (snap.exists && snap.data().banned) {
            // Si está baneado: cerrar sesión y avisar
            await auth.signOut();
            alert("Tu cuenta ha sido baneada. Contacta al administrador.");
            return;
          }
        } catch (err) {
          // Si falla el chequeo, no bloqueamos por seguridad
          console.error("Error al comprobar ban:", err);
        }
      }
      // No interferimos con otras lógicas - permitimos que el resto de onAuthStateChanged del HTML corra normalmente
    });
  }

  // Envoltorio para renderPost: si el autor está baneado, no retorna elemento (oculta post)
  // Solo si renderPost existe
  if (typeof renderPost === "function") {
    const originalRenderPost = renderPost;
    renderPost = function (doc, userId) {
      const data = doc.data();
      // comprobamos bandera 'banned' en users collection; si existe y es true => retorna null (no mostrar)
      // creación sin bloqueo: devolvemos un placeholder y lo filtrará quien llame; para evitar romper, devolvemos null y quien itere debe comprobar.
      // pero para seguridad, devolvemos un empty element (invisible) para que no rompa el append.
      const placeholder = document.createElement('div');
      try {
        db.collection("users").doc(data.uid).get().then((snap) => {
          if (snap.exists && snap.data().banned) {
            // usuario baneado: devolver elemento vacío (no visible)
            placeholder.style.display = "none";
          } else {
            // no baneado: usar render normal y replace placeholder
            const el = originalRenderPost(doc, userId);
            if (el && placeholder.parentNode) {
              placeholder.replaceWith(el);
            } else if (el) {
              // si placeholder no está en DOM aún, simplemente return el
              // but to keep caller behavior, replace via timeout if needed
            }
          }
        }).catch(()=> {
          // en caso de error, mostrar post normalmente
          const el = originalRenderPost(doc, userId);
          if (el && placeholder.parentNode) placeholder.replaceWith(el);
        });
      } catch (err) {
        const el = originalRenderPost(doc, userId);
        if (el && placeholder.parentNode) placeholder.replaceWith(el);
      }
      return placeholder;
    };
  }

  // Modificar renderProfileCard para añadir icono verificado si corresponde y ocultar perfil si baneado (no rompe si no existe)
  if (typeof renderProfileCard === "function") {
    const originalRenderProfileCard = renderProfileCard;
    renderProfileCard = async function (userData) {
      // Primero chequeamos si el userData corresponde a un usuario baneado
      if (userData && userData.uid) {
        try {
          const snap = await db.collection("users").doc(userData.uid).get();
          if (snap.exists && snap.data().banned) {
            // Si es el propio perfil que estamos mostrando y está baneado, mostramos mensaje
            const c = document.getElementById('profile-card');
            if (c) {
              c.innerHTML = '<div class=\"text-center text-red-600\">Usuario baneado</div>';
            }
            return;
          }
        } catch (err) {
          // ignore
        }
      }
      // Llamar al render original y luego añadir icono si verified
      originalRenderProfileCard(userData);
      try {
        if (userData && userData.uid) {
          const snap = await db.collection("users").doc(userData.uid).get();
          if (snap.exists && snap.data().verified) {
            const nameEl = document.querySelector("#profile-card h3");
            if (nameEl && !nameEl.querySelector('.verified-icon')) {
              const icon = document.createElement("img");
              icon.src = VERIFIED_ICON;
              icon.className = "verified-icon";
              icon.style.width = "20px";
              icon.style.height = "20px";
              icon.style.marginLeft = "6px";
              nameEl.appendChild(icon);
            }
          }
        }
      } catch (err) { /* noop */ }
    };
  }

  // fin DOMContentLoaded
});
</script>

</body>
</html>
