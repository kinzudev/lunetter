<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lunetter</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #e6e6e6;
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 200px;
      border-right: 1px solid #333;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .sidebar button {
      background: none;
      border: none;
      color: #e6e6e6;
      font-size: 18px;
      margin: 15px 0;
      cursor: pointer;
      transition: 0.2s;
    }

    .sidebar button:hover {
      color: #1DA1F2;
    }

    /* Feed */
    .feed {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-y: auto;
    }

    .new-post {
      width: 100%;
      max-width: 600px;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .new-post textarea {
      width: 100%;
      background: #000;
      color: #fff;
      border: none;
      resize: none;
      font-size: 16px;
      padding: 10px;
      outline: none;
    }

    .new-post button {
      margin-top: 10px;
      padding: 8px 16px;
      background: #1DA1F2;
      border: none;
      border-radius: 20px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      float: right;
    }

    .post {
      width: 100%;
      max-width: 600px;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .username {
      font-weight: bold;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <button>Home</button>
    <button>Explore</button>
    <button>Notifications</button>
    <button>Profile</button>
  </div>

  <div class="feed">
    <div class="new-post">
      <textarea id="postInput" rows="3" placeholder="What's happening?"></textarea>
      <button onclick="addPost()">Post</button>
    </div>
    <div id="posts"></div>
  </div>

  <script>
    function addPost() {
      const input = document.getElementById('postInput');
      const text = input.value.trim();
      if (text === '') return;

      const postContainer = document.createElement('div');
      postContainer.className = 'post';

      const username = document.createElement('div');
      username.className = 'username';
      username.textContent = "User";

      const content = document.createElement('div');
      content.textContent = text;

      postContainer.appendChild(username);
      postContainer.appendChild(content);

      const posts = document.getElementById('posts');
      posts.insertBefore(postContainer, posts.firstChild);

      input.value = '';
    }
  </script>
</body>
</html>
