<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lunetter</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #000;
      color: #fff;
      display: flex;
    }
    /* Sidebar */
    .sidebar {
      width: 220px;
      border-right: 1px solid #222;
      padding: 20px;
      height: 100vh;
    }
    .sidebar a {
      display: block;
      margin: 15px 0;
      color: white;
      text-decoration: none;
      font-size: 18px;
    }
    /* Feed */
    .feed {
      flex: 1;
      max-width: 600px;
      margin: auto;
      padding: 20px;
      border-left: 1px solid #222;
      border-right: 1px solid #222;
      min-height: 100vh;
    }
    .postBox {
      display: flex;
      align-items: flex-start;
      border-bottom: 1px solid #222;
      padding-bottom: 15px;
    }
    .postBox img {
      border-radius: 50%;
      width: 45px;
      height: 45px;
      margin-right: 10px;
    }
    .postBox textarea {
      flex: 1;
      background: #111;
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: 8px;
      outline: none;
      resize: none;
    }
    .postBox button {
      background: #1DA1F2;
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      margin-left: 10px;
    }
    /* Posts */
    .post {
      border-bottom: 1px solid #222;
      padding: 15px;
      display: flex;
      gap: 10px;
    }
    .post img {
      border-radius: 50%;
      width: 45px;
      height: 45px;
    }
    .postContent {
      flex: 1;
    }
    .postContent b {
      color: #1DA1F2;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <a href="#">Home</a>
    <a href="#">Explore</a>
    <a href="#">Notifications</a>
    <a href="#">Profile</a>
    <a href="#" onclick="logout()">Cerrar sesión</a>
  </div>

  <!-- Feed -->
  <div class="feed">
    <!-- Caja para postear -->
    <div class="postBox">
      <img src="https://i.pravatar.cc/100" alt="avatar">
      <textarea id="postInput" placeholder="What's happening?"></textarea>
      <button onclick="addPost()">Post</button>
    </div>

    <!-- Lista de posts -->
    <div id="posts"></div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

    // 🔥 Tu configuración de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBZvsL3zwUsHmTL0QZxQOkWF28_N2FR4L0",
      authDomain: "lunetter-55d46.firebaseapp.com",
      projectId: "lunetter-55d46",
      storageBucket: "lunetter-55d46.firebasestorage.app",
      messagingSenderId: "798507844928",
      appId: "1:798507844928:web:20e8a48a66a85ee6c6e6a5",
      measurementId: "G-46BL2MEZ68"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Función para publicar
    async function addPost() {
      const input = document.getElementById("postInput");
      const text = input.value.trim();
      if (!text) return;

      await addDoc(collection(db, "posts"), {
        user: "Anon", // 👈 luego lo conectamos con el login real
        avatar: "https://i.pravatar.cc/100",
        text: text,
        created: serverTimestamp()
      });

      input.value = "";
    }

    // Mostrar posts en tiempo real
    const postsDiv = document.getElementById("posts");
    const q = query(collection(db, "posts"), orderBy("created", "desc"));

    onSnapshot(q, (snapshot) => {
      postsDiv.innerHTML = "";
      snapshot.forEach(doc => {
        const post = doc.data();
        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `
          <img src="${post.avatar || "https://i.pravatar.cc/100"}" alt="avatar">
          <div class="postContent">
            <b>${post.user || "Anon"}</b><br>
            ${post.text}
          </div>
        `;
        postsDiv.appendChild(div);
      });
    });

    // Hacer global la función para el botón
    window.addPost = addPost;
    window.logout = function() {
      alert("Cerrar sesión (aquí iría la lógica real)");
    }
  </script>
</body>
</html>
