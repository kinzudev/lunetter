<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lunetter</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #000;
      color: #e6e6e6;
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      border-right: 1px solid #333;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .sidebar button {
      background: none;
      border: none;
      color: #e6e6e6;
      font-size: 18px;
      margin: 15px 0;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      text-align: left;
      padding: 10px 20px;
      border-radius: 30px;
    }

    .sidebar button:hover {
      background-color: #111;
      color: #1DA1F2;
    }

    /* Feed */
    .feed {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-y: auto;
    }

    .new-post {
      width: 100%;
      max-width: 600px;
      background: #000;
      border-bottom: 1px solid #333;
      display: flex;
      padding: 15px;
    }

    .new-post img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .new-post-content {
      flex: 1;
    }

    .new-post textarea {
      width: 100%;
      background: transparent;
      color: #fff;
      border: none;
      resize: none;
      font-size: 16px;
      padding: 10px 0;
      outline: none;
    }

    .new-post button {
      margin-top: 10px;
      padding: 8px 16px;
      background: #1DA1F2;
      border: none;
      border-radius: 20px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      float: right;
    }

    .post {
      width: 100%;
      max-width: 600px;
      background: #000;
      border-bottom: 1px solid #333;
      padding: 15px;
      display: flex;
    }

    .post img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .post-content {
      flex: 1;
    }

    .post-header {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
    }

    .post-name {
      font-weight: bold;
      margin-right: 5px;
    }

    .post-username {
      color: #777;
      font-size: 14px;
    }

    .post-text {
      font-size: 15px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <button>Home</button>
    <button>Explore</button>
    <button>Notifications</button>
    <button>Profile</button>
  </div>

  <div class="feed">
    <!-- New post form -->
    <div class="new-post">
      <img src="https://i.pravatar.cc/48?img=1" alt="Profile">
      <div class="new-post-content">
        <textarea id="postInput" rows="3" placeholder="What's happening?"></textarea>
        <button onclick="addPost()">Post</button>
      </div>
    </div>

    <!-- Posts feed -->
    <div id="posts"></div>
  </div>

  <script>
    function addPost() {
      const input = document.getElementById('postInput');
      const text = input.value.trim();
      if (text === '') return;

      const postContainer = document.createElement('div');
      postContainer.className = 'post';

      const avatar = document.createElement('img');
      avatar.src = "https://i.pravatar.cc/48?img=" + Math.floor(Math.random() * 70);

      const contentWrapper = document.createElement('div');
      contentWrapper.className = 'post-content';

      const header = document.createElement('div');
      header.className = 'post-header';

      const name = document.createElement('span');
      name.className = 'post-name';
      name.textContent = "User";

      const username = document.createElement('span');
      username.className = 'post-username';
      username.textContent = " @username";

      const content = document.createElement('div');
      content.className = 'post-text';
      content.textContent = text;

      header.appendChild(name);
      header.appendChild(username);

      contentWrapper.appendChild(header);
      contentWrapper.appendChild(content);

      postContainer.appendChild(avatar);
      postContainer.appendChild(contentWrapper);

      const posts = document.getElementById('posts');
      posts.insertBefore(postContainer, posts.firstChild);

      input.value = '';
    }
  </script>
</body>
</html>
