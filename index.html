<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lunett1er</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      display: flex;
    }
    .sidebar {
      width: 220px;
      background: #000;
      border-right: 1px solid #222;
      padding: 20px;
      height: 100vh;
    }
    .sidebar a {
      display: block;
      padding: 12px;
      color: white;
      text-decoration: none;
      font-size: 18px;
    }
    .sidebar a:hover {
      background: #111;
      border-radius: 10px;
    }
    .main {
      flex: 1;
      padding: 20px;
    }
    .post-box {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px;
      border-bottom: 1px solid #333;
    }
    .post-box textarea {
      flex: 1;
      background: black;
      border: 1px solid #333;
      color: white;
      border-radius: 10px;
      padding: 10px;
    }
    .post-box button {
      background: #1DA1F2;
      border: none;
      color: white;
      padding: 10px 15px;
      border-radius: 20px;
      cursor: pointer;
    }
    .post {
      border-bottom: 1px solid #333;
      padding: 15px;
      display: flex;
      gap: 10px;
    }
    .post img {
      border-radius: 50%;
    }
    .post strong {
      color: #1DA1F2;
    }
    .comment {
      margin-left: 50px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .comment button {
      background: none;
      border: none;
      color: red;
      cursor: pointer;
    }
    .auth-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-box {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }
    .auth-box input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #333;
      border-radius: 6px;
      background: #000;
      color: white;
    }
    .auth-box button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #1DA1F2;
      border: none;
      color: white;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <a href="#">Home</a>
    <a href="#">Explore</a>
    <a href="#">Notifications</a>
    <a href="#">Profile</a>
    <a href="#" id="logoutBtn">Cerrar sesión</a>
  </div>

  <div class="main">
    <div class="post-box">
      <img id="userAvatar" src="https://i.pravatar.cc/40" width="40" height="40">
      <textarea id="postInput" placeholder="What's happening?"></textarea>
      <button id="postBtn">Post</button>
    </div>
    <div id="posts"></div>
  </div>

  <!-- Pantalla de login/register -->
  <div class="auth-container" id="authContainer">
    <div class="auth-box">
      <h2 id="authTitle">Registrar</h2>
      <input type="text" id="usernameInput" placeholder="Nombre de usuario">
      <input type="password" id="passwordInput" placeholder="Contraseña">
      <button id="registerBtn">Registrar</button>
      <button id="loginBtn">Iniciar Sesión</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore, collection, doc, addDoc, onSnapshot, orderBy, query,
      serverTimestamp, updateDoc, arrayUnion, deleteDoc, getDocs, setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // --- Tu config ---
    const firebaseConfig = {
      apiKey: "AIzaSyBwj_as6pb5Bg81F9Cl9VWTKkekMM9Exfk",
      authDomain: "pekora-forum.firebaseapp.com",
      projectId: "pekora-forum",
      storageBucket: "pekora-forum.firebasestorage.app",
      messagingSenderId: "161910967859",
      appId: "1:161910967859:web:6a28cecaae74b9b7e9dd46",
      measurementId: "G-BPBTW5KBRK"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Helpers
    function getUser() {
      const u = localStorage.getItem("sessionUser");
      return u ? JSON.parse(u) : null;
    }
    function saveUser(user) {
      localStorage.setItem("sessionUser", JSON.stringify(user));
    }
    function escapeHtml(str) {
      if (!str) return "";
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
    function genId() { return `${Date.now()}-${Math.random().toString(36).slice(2,9)}`; }

    // Auth
    const authContainer = document.getElementById("authContainer");
    const registerBtn = document.getElementById("registerBtn");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    async function userExists(username) {
      const snap = await getDocs(collection(db,"users"));
      let found = false;
      snap.forEach(d => {
        if(d.id === username) found = true;
      });
      return found;
    }

    registerBtn.addEventListener("click", async () => {
      const username = document.getElementById("usernameInput").value.trim();
      const password = document.getElementById("passwordInput").value.trim();
      if(!username || !password) return alert("Completa los campos");

      if(await userExists(username)) {
        return alert("Usuario ya existe");
      }
      await setDoc(doc(db,"users",username), { username, password, avatar:`https://i.pravatar.cc/150?u=${username}` });
      saveUser({username, avatar:`https://i.pravatar.cc/150?u=${username}`});
      authContainer.style.display="none";
    });

    loginBtn.addEventListener("click", async () => {
      const username = document.getElementById("usernameInput").value.trim();
      const password = document.getElementById("passwordInput").value.trim();
      if(!username || !password) return alert("Completa los campos");

      const snap = await getDocs(collection(db,"users"));
      let ok = false, avatar="";
      snap.forEach(d=>{
        if(d.id===username && d.data().password===password){ ok=true; avatar=d.data().avatar; }
      });
      if(!ok) return alert("Credenciales incorrectas");
      saveUser({username, avatar});
      authContainer.style.display="none";
    });

    logoutBtn.addEventListener("click", ()=>{
      localStorage.removeItem("sessionUser");
      location.reload();
    });

    // Mostrar login si no hay sesión
    if(getUser()) authContainer.style.display="none";

    // Posts
    const postBtn = document.getElementById("postBtn");
    const postInput = document.getElementById("postInput");
    const postsContainer = document.getElementById("posts");

    postBtn.addEventListener("click", async ()=>{
      const user=getUser();
      if(!user) return alert("Inicia sesión");
      const text=postInput.value.trim();
      if(!text) return;
      await addDoc(collection(db,"posts"),{
        user:user.username,
        avatar:user.avatar,
        text,
        created:serverTimestamp(),
        likes:[],
        comments:[]
      });
      postInput.value="";
    });

    function renderPost(docSnap){
      const data=docSnap.data();
      const postId=docSnap.id;
      const div=document.createElement("div");
      div.className="post";
      div.innerHTML=`
        <img src="${data.avatar}" width="40" height="40">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:6px">
            <strong>${escapeHtml(data.user)}</strong>
            <span style="color:#999">@${escapeHtml(data.user)}</span>
            <div style="flex:1"></div>
            ${(getUser() && getUser().username===data.user)?'<button class="delPostBtn">🗑️</button>':""}
          </div>
          <div style="margin:6px 0">${escapeHtml(data.text)}</div>
          <div>
            <button class="likeBtn">❤️ ${data.likes.length}</button>
            <button class="toggleCommentsBtn">💬 ${data.comments.length}</button>
          </div>
          <div class="comments" style="display:none"></div>
          <div style="display:flex;gap:4px;margin-top:6px">
            <input type="text" class="commentInput" placeholder="Escribe un comentario..." style="flex:1">
            <button class="sendCommentBtn">Enviar</button>
          </div>
        </div>`;
      const commentsDiv=div.querySelector(".comments");
      function renderComments(){
        commentsDiv.innerHTML="";
        data.comments.forEach(c=>{
          const cd=document.createElement("div");
          cd.className="comment";
          cd.innerHTML=`<span><b>${escapeHtml(c.user)}</b>: ${escapeHtml(c.text)}</span>`;
          if(getUser() && c.user===getUser().username){
            const btn=document.createElement("button");
            btn.textContent="🗑️";
            btn.onclick=async()=>{
              const updated=data.comments.filter(cc=>cc.id!==c.id);
              await updateDoc(doc(db,"posts",postId),{comments:updated});
            };
            cd.appendChild(btn);
          }
          commentsDiv.appendChild(cd);
        });
      }
      renderComments();

      div.querySelector(".toggleCommentsBtn").onclick=()=>{
        commentsDiv.style.display=commentsDiv.style.display==="none"?"block":"none";
        renderComments();
      };
      div.querySelector(".sendCommentBtn").onclick=async()=>{
        const input=div.querySelector(".commentInput");
        const txt=input.value.trim();
        if(!txt) return;
        if(!getUser()) return alert("Inicia sesión");
        const newComment={id:genId(), user:getUser().username, text:txt};
        await updateDoc(doc(db,"posts",postId),{comments:[...data.comments,newComment]});
        input.value="";
      };
      if(div.querySelector(".delPostBtn")){
        div.querySelector(".delPostBtn").onclick=async()=>{
          await deleteDoc(doc(db,"posts",postId));
        };
      }
      div.querySelector(".likeBtn").onclick=async()=>{
        if(!getUser()) return alert("Inicia sesión");
        if(!data.likes.includes(getUser().username)){
          await updateDoc(doc(db,"posts",postId),{likes:[...data.likes,getUser().username]});
        }
      };
      return div;
    }

    const q=query(collection(db,"posts"),orderBy("created","desc"));
    onSnapshot(q,snap=>{
      postsContainer.innerHTML="";
      snap.forEach(d=>{
        postsContainer.appendChild(renderPost(d));
      });
    });
  </script>

<script type="module">
  import { getStorage, ref, uploadBytes, getDownloadURL } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
  import { collection, addDoc, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { db } from "./firebase-init.js"; // 🔥 inicialización de Firebase
  import { getUser } from "./auth.js";     // 🔥 tu función que devuelve el usuario logueado

  const storage = getStorage();

  // Caja de posteo
  const postBox = document.querySelector(".post-box");
  const postBtn = document.getElementById("postBtn");
  const postInput = document.getElementById("postInput");

  // Input de imagen
  const fileInput = document.createElement("input");
  fileInput.type = "file";
  fileInput.accept = "image/*";
  fileInput.id = "imageInput";
  fileInput.style.marginTop = "10px";
  postBox.insertBefore(fileInput, postBtn);

  // Preview de la imagen
  const preview = document.createElement("img");
  preview.style.maxWidth = "200px";
  preview.style.marginTop = "10px";
  preview.style.display = "none";
  postBox.insertBefore(preview, postBtn);

  fileInput.addEventListener("change", () => {
    if (fileInput.files.length > 0) {
      preview.src = URL.createObjectURL(fileInput.files[0]);
      preview.style.display = "block";
    } else {
      preview.style.display = "none";
    }
  });

  // Botón Post (texto + imagen)
  postBtn.addEventListener("click", async () => {
    const user = getUser();
    if (!user) return alert("Inicia sesión primero");

    const text = postInput.value.trim();
    const file = fileInput.files[0];

    if (!text && !file) return alert("Escribe algo o sube una imagen");

    try {
      let imageUrl = null;

      if (file) {
        const filePath = `posts/${user.username}-${Date.now()}-${file.name}`;
        const storageRef = ref(storage, filePath);
        await uploadBytes(storageRef, file);
        imageUrl = await getDownloadURL(storageRef);
      }

      await addDoc(collection(db, "posts"), {
        user: user.username,
        avatar: user.avatar,
        text,
        image: imageUrl,
        created: serverTimestamp(),
        likes: [],
        comments: []
      });

      // Reset
      postInput.value = "";
      fileInput.value = "";
      preview.style.display = "none";

    } catch (err) {
      console.error("Error publicando post:", err);
      alert("Error al publicar");
    }
  });

  // Renderizar post con imagen si existe
  const oldRenderPost = renderPost;
  renderPost = function (docSnap) {
    const div = oldRenderPost(docSnap);
    const data = docSnap.data();

    if (data.image) {
      const img = document.createElement("img");
      img.src = data.image;
      img.style.maxWidth = "100%";
      img.style.borderRadius = "10px";
      img.style.marginTop = "8px";
      div.querySelector("div[style*='flex:1']").appendChild(img);
    }

    return div;
  };
</script>

</body>
</html>
