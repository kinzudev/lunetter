<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lunetter</title>
  <style>
    body { margin:0; font-family:"Segoe UI",sans-serif; background:#000; color:#fff; display:flex; }
    /* Panel de login */
    #loginPanel {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:#000; display:flex; align-items:center; justify-content:center;
    }
    #loginPanel form {
      background:#111; padding:20px; border-radius:10px;
      display:flex; flex-direction:column; gap:10px; width:300px;
    }
    #loginPanel input { padding:10px; border:none; border-radius:5px; background:#222; color:white; }
    #loginPanel button { background:#1DA1F2; border:none; padding:10px; border-radius:5px; color:white; cursor:pointer; }
    /* Sidebar */
    .sidebar { width:220px; border-right:1px solid #222; padding:20px; height:100vh; }
    .sidebar a { display:block; margin:15px 0; color:white; text-decoration:none; font-size:18px; }
    /* Feed */
    .feed { flex:1; max-width:600px; margin:auto; padding:20px; border-left:1px solid #222; border-right:1px solid #222; min-height:100vh; }
    .postBox { display:flex; align-items:flex-start; border-bottom:1px solid #222; padding-bottom:15px; }
    .postBox img { border-radius:50%; width:45px; height:45px; margin-right:10px; }
    .postBox textarea { flex:1; background:#111; color:#fff; border:none; padding:10px; border-radius:8px; outline:none; resize:none; }
    .postBox button { background:#1DA1F2; border:none; color:white; padding:8px 16px; border-radius:20px; cursor:pointer; margin-left:10px; }
    .post { border-bottom:1px solid #222; padding:15px; display:flex; gap:10px; }
    .post img { border-radius:50%; width:45px; height:45px; }
    .postHeader { display:flex; align-items:center; gap:8px; }
    .postHeader b { color:#1DA1F2; }
    .actions { margin-top:8px; display:flex; gap:15px; font-size:14px; cursor:pointer; }
    .comments { margin-top:10px; padding-left:20px; border-left:1px solid #222; }
    .comment { margin:5px 0; font-size:14px; }
    .commentInput { margin-top:8px; display:flex; gap:5px; }
    .commentInput input { flex:1; padding:5px; border:none; border-radius:5px; background:#111; color:white; }
    .commentInput button { background:#1DA1F2; border:none; color:white; padding:5px 10px; border-radius:5px; cursor:pointer; }
  </style>
</head>
<body>
  <!-- Panel de login -->
  <div id="loginPanel">
    <form id="loginForm">
      <h2>Entrar</h2>
      <input type="text" id="username" placeholder="Nombre de usuario" required>
      <input type="file" id="avatarFile" accept="image/*">
      <button type="submit">Ingresar</button>
    </form>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" style="display:none;">
    <a href="#">Home</a>
    <a href="#">Explore</a>
    <a href="#">Notifications</a>
    <a href="#">Profile</a>
    <a href="#" onclick="logout()">Cerrar sesión</a>
  </div>

  <!-- Feed -->
  <div class="feed" style="display:none;">
    <!-- Caja para postear -->
    <div class="postBox">
      <img id="userAvatar" src="https://i.pravatar.cc/100" alt="avatar">
      <textarea id="postInput" placeholder="What's happening?"></textarea>
      <button onclick="addPost()">Post</button>
    </div>

    <!-- Lista de posts -->
    <div id="posts"></div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, orderBy, query, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-storage.js";

    // Configuración Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBZvsL3zwUsHmTL0QZxQOkWF28_N2FR4L0",
      authDomain: "lunetter-55d46.firebaseapp.com",
      projectId: "lunetter-55d46",
      storageBucket: "lunetter-55d46.appspot.com",
      messagingSenderId: "798507844928",
      appId: "1:798507844928:web:20e8a48a66a85ee6c6e6a5",
      measurementId: "G-46BL2MEZ68"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentUser = null;

    // Login simple con username
    const loginForm = document.getElementById("loginForm");
    const avatarFileInput = document.getElementById("avatarFile");

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      if (!username) return;

      let avatarURL = "https://i.pravatar.cc/100?u=" + username;
      const file = avatarFileInput.files[0];
      if (file) {
        const storageRef = ref(storage, "avatars/" + username);
        await uploadBytes(storageRef, file);
        avatarURL = await getDownloadURL(storageRef);
      }

      // Guardar sesión local
      currentUser = { username, avatar: avatarURL };
      localStorage.setItem("sessionUser", JSON.stringify(currentUser));

      startApp();
    });

    // Restaurar sesión
    window.addEventListener("load", () => {
      const savedUser = localStorage.getItem("sessionUser");
      if (savedUser) {
        currentUser = JSON.parse(savedUser);
        startApp();
      }
    });

    function startApp() {
      document.getElementById("loginPanel").style.display = "none";
      document.querySelector(".sidebar").style.display = "block";
      document.querySelector(".feed").style.display = "block";
      document.getElementById("userAvatar").src = currentUser.avatar;
      renderPosts();
    }

    // Publicar
    async function addPost() {
      const input = document.getElementById("postInput");
      const text = input.value.trim();
      if (!text || !currentUser) return;

      await addDoc(collection(db, "posts"), {
        user: currentUser.username,
        avatar: currentUser.avatar,
        text: text,
        created: serverTimestamp()
      });

      input.value = "";
    }

    // Like
    async function toggleLike(postId) {
      if (!currentUser) return;
      const likeRef = doc(db, "posts", postId, "likes", currentUser.username);
      await setDoc(likeRef, { user: currentUser.username }, { merge: true });
    }

    // Comentar
    async function addComment(postId, inputId) {
      if (!currentUser) return;
      const input = document.getElementById(inputId);
      const text = input.value.trim();
      if (!text) return;

      await addDoc(collection(db, "posts", postId, "comments"), {
        user: currentUser.username,
        text: text,
        created: serverTimestamp()
      });

      input.value = "";
    }

    // Render posts
    function renderPosts() {
      const postsDiv = document.getElementById("posts");
      const q = query(collection(db, "posts"), orderBy("created", "desc"));

      onSnapshot(q, (snapshot) => {
        postsDiv.innerHTML = "";
        snapshot.forEach(docSnap => {
          const post = docSnap.data();
          const postId = docSnap.id;

          const div = document.createElement("div");
          div.className = "post";

          div.innerHTML = `
            <img src="${post.avatar}" alt="avatar">
            <div class="postContent">
              <div class="postHeader">
                <b>${post.user}</b>
              </div>
              ${post.text}
              <div class="actions">
                <span onclick="toggleLike('${postId}')">❤️ <span class="likesCount">0</span></span>
                <span>💬 Comentar</span>
              </div>
              <div class="comments"></div>
              <div class="commentInput">
                <input type="text" id="comment-${postId}" placeholder="Escribe un comentario...">
                <button onclick="addComment('${postId}','comment-${postId}')">Enviar</button>
              </div>
            </div>
          `;

          // Likes en tiempo real
          const likesRef = collection(db, "posts", postId, "likes");
          onSnapshot(likesRef, (likeSnap) => {
            div.querySelector(".likesCount").innerText = likeSnap.size;
          });

          // Comentarios en tiempo real
          const commentsRef = collection(db, "posts", postId, "comments");
          onSnapshot(commentsRef, (commentSnap) => {
            const commentsDiv = div.querySelector(".comments");
            commentsDiv.innerHTML = "";
            commentSnap.forEach(c => {
              const cm = c.data();
              const cmDiv = document.createElement("div");
              cmDiv.className = "comment";
              cmDiv.innerHTML = `<b>${cm.user}:</b> ${cm.text}`;
              commentsDiv.appendChild(cmDiv);
            });
          });

          postsDiv.appendChild(div);
        });
      });
    }

    // Logout
    window.logout = async function() {
      localStorage.removeItem("sessionUser");
      currentUser = null;
      location.reload();
    }

    // Exponer funciones globales
    window.addPost = addPost;
    window.toggleLike = toggleLike;
    window.addComment = addComment;
  </script>
</body>
</html>
