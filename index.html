<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mini Twitter con Firebase</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #000;
      color: #fff;
    }
    .feed {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    textarea {
      width: 100%;
      background: #111;
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: 8px;
      outline: none;
      resize: none;
    }
    button {
      margin-top: 10px;
      padding: 8px 16px;
      border: none;
      border-radius: 20px;
      background: #1DA1F2;
      color: white;
      cursor: pointer;
    }
    .post {
      background: #111;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
      border: 1px solid #333;
    }
    .post b {
      color: #1DA1F2;
    }
  </style>
</head>
<body>
  <div class="feed">
    <h2>Mini Twitter 🚀</h2>
    <textarea id="postInput" placeholder="¿Qué está pasando?"></textarea>
    <button onclick="addPost()">Publicar</button>
    <div id="posts"></div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

    // 🔥 Tu configuración de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBZvsL3zwUsHmTL0QZxQOkWF28_N2FR4L0",
      authDomain: "lunetter-55d46.firebaseapp.com",
      projectId: "lunetter-55d46",
      storageBucket: "lunetter-55d46.firebasestorage.app",
      messagingSenderId: "798507844928",
      appId: "1:798507844928:web:20e8a48a66a85ee6c6e6a5",
      measurementId: "G-46BL2MEZ68"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Función para publicar un post
    async function addPost() {
      const input = document.getElementById("postInput");
      const text = input.value.trim();
      if (!text) return;

      await addDoc(collection(db, "posts"), {
        user: "Anon",   // 👈 luego lo conectamos con el login
        text: text,
        created: serverTimestamp(),
        likes: 0
      });

      input.value = "";
    }

    // Mostrar posts en tiempo real
    const postsDiv = document.getElementById("posts");
    const q = query(collection(db, "posts"), orderBy("created", "desc"));

    onSnapshot(q, (snapshot) => {
      postsDiv.innerHTML = "";
      snapshot.forEach(doc => {
        const post = doc.data();
        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `<b>${post.user}</b>: ${post.text} <br> ❤️ ${post.likes || 0}`;
        postsDiv.appendChild(div);
      });
    });

    // 👇 Hacemos global la función para que el botón la encuentre
    window.addPost = addPost;
  </script>
</body>
</html>
