<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Lunetter</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{--accent:#1DA1F2;--muted:#777}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Arial,sans-serif;background:#000;color:#e6e6e6;display:flex;height:100vh}
    /* Login */
    #loginPanel{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;z-index:30}
    .loginBox{width:340px;background:#0b0c0d;border:1px solid #222;padding:20px;border-radius:12px;display:flex;flex-direction:column;gap:10px}
    .loginBox h2{margin:0 0 6px 0}
    .loginBox input{padding:10px;border-radius:8px;border:1px solid #222;background:#0f1113;color:#fff}
    .rowBtns{display:flex;gap:10px;margin-top:6px}
    .btn{background:var(--accent);border:none;padding:9px 12px;border-radius:9px;color:#fff;cursor:pointer}
    .btn.secondary{background:#222}
    .error{color:#ff6b6b;font-size:13px;min-height:18px}
    /* Layout */
    .sidebar{width:220px;border-right:1px solid #111;padding:20px;display:flex;flex-direction:column;gap:8px}
    .sidebar button{background:none;border:none;color:inherit;text-align:left;padding:10px;border-radius:10px;cursor:pointer;font-size:16px}
    .sidebar button:hover{background:#0f1113;color:var(--accent)}
    .main{flex:1;display:flex;justify-content:center;overflow:auto;padding:20px}
    .feed{width:100%;max-width:640px}
    .composer{display:flex;gap:12px;padding:14px;border-bottom:1px solid #111}
    .composer img{width:52px;height:52px;border-radius:50%}
    .composer textarea{flex:1;background:transparent;border:none;color:#e6e6e6;font-size:15px;resize:none}
    .post{display:flex;gap:12px;padding:14px;border-bottom:1px solid #111}
    .post img{width:48px;height:48px;border-radius:50%}
    .postContent{flex:1}
    .postHeader{display:flex;align-items:center;gap:8px}
    .postHeader .name{font-weight:700;color:var(--accent)}
    .postHeader .user{color:var(--muted);font-size:13px}
    .postText{margin:8px 0}
    .actions{display:flex;gap:16px;color:var(--muted);font-size:14px;align-items:center}
    .actions .likeBtn{cursor:pointer}
    .actions .likeBtn.liked{color:#ff6b6b}
    .comments{margin-top:8px;padding-left:8px;border-left:2px solid #111}
    .comment{display:flex;gap:8px;margin-top:8px}
    .comment img{width:32px;height:32px;border-radius:50%}
    .commentBubble{background:#0d0e10;padding:8px;border-radius:8px}
    .commentInput{display:flex;gap:8px;margin-top:10px}
    .commentInput input{flex:1;padding:8px;border-radius:8px;border:1px solid #222;background:#0f1113;color:#fff}
    .hidden{display:none}
  </style>
</head>
<body>
  <!-- LOGIN / REGISTER -->
  <div id="loginPanel">
    <div class="loginBox">
      <h2>Lunetter — Entrar / Registrarse</h2>
      <input id="inpUsername" type="text" placeholder="Nombre de usuario (sin espacios)" />
      <input id="inpPassword" type="password" placeholder="Contraseña" />
      <label style="font-size:13px;color:#777">Avatar opcional</label>
      <input id="inpAvatar" type="file" accept="image/*" />
      <div class="rowBtns">
        <button id="btnLogin" class="btn">Ingresar</button>
        <button id="btnRegister" class="btn secondary">Registrarse</button>
      </div>
      <div id="loginError" class="error"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="appUI" class="hidden" style="display:flex;width:100%">
    <aside class="sidebar">
      <button>Home</button>
      <button>Explore</button>
      <button>Notifications</button>
      <button>Profile</button>
      <div style="flex:1"></div>
      <div style="display:flex;gap:8px;align-items:center">
        <img id="sidebarAvatar" src="https://i.pravatar.cc/100" style="width:36px;height:36px;border-radius:50%" />
        <div style="flex:1">
          <div id="sidebarUser" style="font-weight:700"></div>
          <button onclick="logout()" style="background:#222;border:none;color:#ddd;padding:6px;border-radius:8px;cursor:pointer">Cerrar sesión</button>
        </div>
      </div>
    </aside>
    <main class="main">
      <div class="feed">
        <div class="composer">
          <img id="composerAvatar" src="https://i.pravatar.cc/100" />
          <div style="flex:1;display:flex;flex-direction:column">
            <textarea id="postInput" rows="3" placeholder="¿Qué está pasando?"></textarea>
            <div style="display:flex;justify-content:flex-end;margin-top:8px">
              <button class="btn" onclick="addPost()">Publicar</button>
            </div>
          </div>
        </div>
        <div id="posts"></div>
      </div>
    </main>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, orderBy, query, serverTimestamp, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBZvsL3zwUsHmTL0QZxQOkWF28_N2FR4L0",
      authDomain: "lunetter-55d46.firebaseapp.com",
      projectId: "lunetter-55d46",
      storageBucket: "lunetter-55d46.firebasestorage.app",
      messagingSenderId: "798507844928",
      appId: "1:798507844928:web:20e8a48a66a85ee6c6e6a5",
      measurementId: "G-46BL2MEZ68"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentUser = null;
    const postsDiv = document.getElementById('posts');

    // ----------- util hash ----------
    async function hashPassword(password) {
      const enc = new TextEncoder();
      const data = enc.encode(password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hashBuffer)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }

    // ----------- login/register ----------
    const inpUsername=document.getElementById('inpUsername');
    const inpPassword=document.getElementById('inpPassword');
    const inpAvatar=document.getElementById('inpAvatar');
    const btnLogin=document.getElementById('btnLogin');
    const btnRegister=document.getElementById('btnRegister');
    const loginError=document.getElementById('loginError');

    btnRegister.onclick=async()=>{
      loginError.textContent='';
      const username=inpUsername.value.trim();
      const password=inpPassword.value;
      if(!username||!password){loginError.textContent='Completa usuario y contraseña.';return;}
      if(/\s/.test(username)){loginError.textContent='El nombre no puede tener espacios.';return;}
      const userRef=doc(db,'users',username);
      const snap=await getDoc(userRef);
      if(snap.exists()){loginError.textContent='El usuario ya existe.';return;}
      let avatar=`https://i.pravatar.cc/100?u=${encodeURIComponent(username)}`;
      if(inpAvatar.files[0]){const storageRef=ref(storage,`avatars/${username}`);await uploadBytes(storageRef,inpAvatar.files[0]);avatar=await getDownloadURL(storageRef);}
      const hash=await hashPassword(password);
      await setDoc(userRef,{username,passwordHash:hash,avatar,createdAt:serverTimestamp()});
      currentUser={username,avatar};localStorage.setItem('sessionUser',JSON.stringify(currentUser));showApp();
    };

    btnLogin.onclick=async()=>{
      loginError.textContent='';
      const username=inpUsername.value.trim();
      const password=inpPassword.value;
      if(!username||!password){loginError.textContent='Completa usuario y contraseña.';return;}
      const userRef=doc(db,'users',username);
      const snap=await getDoc(userRef);
      if(!snap.exists()){loginError.textContent='Usuario no encontrado.';return;}
      const data=snap.data();
      const hash=await hashPassword(password);
      if(data.passwordHash!==hash){loginError.textContent='Contraseña incorrecta.';return;}
      currentUser={username:data.username,avatar:data.avatar};localStorage.setItem('sessionUser',JSON.stringify(currentUser));showApp();
    };

    // ----------- posts ----------
    window.addPost=async()=>{
      const text=document.getElementById('postInput').value.trim();
      if(!text)return;
      await addDoc(collection(db,'posts'),{user:currentUser.username,avatar:currentUser.avatar,text,created:serverTimestamp()});
      document.getElementById('postInput').value='';
    };

    function showApp(){
      document.getElementById('loginPanel').style.display='none';
      document.getElementById('appUI').classList.remove('hidden');
      document.getElementById('sidebarUser').textContent=currentUser.username;
      document.getElementById('sidebarAvatar').src=currentUser.avatar;
      document.getElementById('composerAvatar').src=currentUser.avatar;
      renderPosts();
    }

    function renderPosts(){
      const q=query(collection(db,'posts'),orderBy('created','desc'));
      onSnapshot(q,(snap)=>{
        postsDiv.innerHTML='';
        snap.forEach(d=>{
          const p=d.data();
          const el=document.createElement('div');
          el.className='post';
          el.innerHTML=`
            <img src="${p.avatar}" />
            <div class="postContent">
              <div class="postHeader"><span class="name">${p.user}</span> <span class="user">@${p.user}</span></div>
              <div class="postText">${p.text}</div>
            </div>`;
          postsDiv.appendChild(el);
        });
      });
    }

    // ----------- restore session ----------
    window.addEventListener('load',()=>{
      const s=localStorage.getItem('sessionUser');
      if(s){currentUser=JSON.parse(s);showApp();}
    });

    window.logout=function(){
      localStorage.removeItem('sessionUser');currentUser=null;
      document.getElementById('appUI').classList.add('hidden');
      document.getElementById('loginPanel').style.display='flex';
    }
  </script>

  <script>
  // Detectar si ya hay usuario en localStorage
  window.addEventListener("load", () => {
    const sessionUser = localStorage.getItem("sessionUser");
    if (sessionUser) {
      document.getElementById("loginPanel").style.display = "none";
      document.getElementById("appUI").classList.remove("hidden");
    }
  });

  // Forzar que después de registrar se muestre el menú principal
  document.addEventListener("DOMContentLoaded", () => {
    const btnRegister = document.getElementById("btnRegister");
    if (btnRegister) {
      btnRegister.addEventListener("click", () => {
        setTimeout(() => {
          document.getElementById("loginPanel").style.display = "none";
          document.getElementById("appUI").classList.remove("hidden");
        }, 800); // pequeña espera para que termine el registro
      });
    }
  });
</script>

</body>
</html>
