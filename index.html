<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunetter</title>
  <style>
    body { margin:0; font-family:Arial, sans-serif; background:#000; color:#fff; }
    .sidebar { width:220px; background:#000; color:#fff; height:100vh; float:left; border-right:1px solid #222; padding:20px; }
    .sidebar a { display:block; margin:20px 0; color:#fff; text-decoration:none; font-size:18px; }
    .main { margin-left:240px; padding:20px; }
    .post-box { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
    .post-box textarea { flex:1; background:#000; border:none; border-bottom:1px solid #333; color:#fff; padding:10px; resize:none; }
    .post-box button { background:#1da1f2; border:none; padding:8px 16px; border-radius:20px; color:#fff; cursor:pointer; }
    .post { border-bottom:1px solid #333; padding:15px 0; display:flex; gap:10px; }
    .post img { width:40px; height:40px; border-radius:50%; }
    .post .user { font-weight:bold; margin-bottom:5px; }
    .actions { margin-top:5px; display:flex; gap:10px; }
    .actions button { background:none; border:none; color:#1da1f2; cursor:pointer; }
    .comments { margin-top:10px; padding-left:50px; }
    .comment { font-size:14px; border-bottom:1px solid #222; padding:5px 0; }
    #auth { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; justify-content:center; align-items:center; }
    #auth form { background:#111; padding:30px; border-radius:10px; display:flex; flex-direction:column; gap:15px; width:300px; }
    #auth input { padding:10px; border:none; border-radius:5px; }
    #auth button { padding:10px; background:#1da1f2; border:none; border-radius:5px; color:#fff; cursor:pointer; }
  </style>
</head>
<body>

<div id="auth">
  <!-- Registro -->
  <form id="registerForm">
    <h2>Registro</h2>
    <input type="text" id="regUsername" placeholder="Nombre de usuario" required />
    <input type="password" id="regPassword" placeholder="Contraseña" required />
    <button type="submit">Registrar</button>
    <button type="button" id="toLogin">Iniciar sesión</button>
    <div id="authError" style="color:red;"></div>
  </form>

  <!-- Login -->
  <form id="loginForm" style="display:none;">
    <h2>Iniciar sesión</h2>
    <input type="text" id="loginUsername" placeholder="Nombre de usuario" required />
    <input type="password" id="loginPassword" placeholder="Contraseña" required />
    <button type="submit">Entrar</button>
    <button type="button" id="toRegister">Registrarse</button>
    <div id="authErrorLogin" style="color:red;"></div>
  </form>
</div>

<div class="sidebar" id="sidebar" style="display:none;">
  <a href="#">Home</a>
  <a href="#">Explore</a>
  <a href="#">Notifications</a>
  <a href="#">Profile</a>
  <a href="#" id="logoutBtn">Cerrar sesión</a>
</div>

<div class="main" id="main" style="display:none;">
  <div class="post-box">
    <img id="currentAvatar" src="" alt="avatar" />
    <textarea id="postText" placeholder="¿Qué está pasando?"></textarea>
    <button id="postBtn">Postear</button>
  </div>
  <div id="feed"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, getDoc, addDoc, onSnapshot, orderBy, query, serverTimestamp, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ✅ Tu nuevo FirebaseConfig
  const firebaseConfig = {
    apiKey: "AIzaSyBwj_as6pb5Bg81F9Cl9VWTKkekMM9Exfk",
    authDomain: "pekora-forum.firebaseapp.com",
    projectId: "pekora-forum",
    storageBucket: "pekora-forum.firebasestorage.app",
    messagingSenderId: "161910967859",
    appId: "1:161910967859:web:6a28cecaae74b9b7e9dd46",
    measurementId: "G-BPBTW5KBRK"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // utilidades
  function randomAvatar() {
    return `https://i.pravatar.cc/150?u=${Math.floor(Math.random()*10000)}`;
  }
  function saveSession(user) { localStorage.setItem("user", JSON.stringify(user)); }
  function getSession() { return JSON.parse(localStorage.getItem("user")); }
  function clearSession() { localStorage.removeItem("user"); }

  // Registro
  async function register(username, password) {
    const userRef = doc(db, "users", username);
    const snap = await getDoc(userRef);
    if (snap.exists()) throw new Error("Usuario ya existe");
    const avatar = randomAvatar();
    await setDoc(userRef, { username, password, avatar, createdAt: serverTimestamp() });
    return { username, avatar };
  }

  // Login
  async function login(username, password) {
    const userRef = doc(db, "users", username);
    const snap = await getDoc(userRef);
    if (!snap.exists()) throw new Error("Usuario no encontrado");
    const data = snap.data();
    if (data.password !== password) throw new Error("Contraseña incorrecta");
    return { username: data.username, avatar: data.avatar };
  }

  // Mostrar app
  function showApp(user) {
    document.getElementById("auth").style.display = "none";
    document.getElementById("main").style.display = "block";
    document.getElementById("sidebar").style.display = "block";
    document.getElementById("currentAvatar").src = user.avatar;
    saveSession(user);
    loadPosts();
  }

  // Render posts
  function renderPost(docSnap, currentUser) {
    const data = docSnap.data();
    const div = document.createElement("div");
    div.className = "post";
    div.innerHTML = `
      <img src="${data.avatar}" />
      <div style="flex:1;">
        <div class="user">${data.user}</div>
        <div>${data.text}</div>
        <div class="actions">
          <button class="likeBtn">❤️ ${data.likes ? data.likes.length : 0}</button>
          <button class="commentBtn">💬 ${data.comments ? data.comments.length : 0}</button>
        </div>
        <div class="comments"></div>
        <div class="comment-box" style="margin-top:5px;">
          <input type="text" class="commentInput" placeholder="Escribe un comentario..." style="width:80%; padding:5px;" />
          <button class="sendComment">Enviar</button>
        </div>
      </div>
    `;

    // Like
    const likeBtn = div.querySelector(".likeBtn");
    likeBtn.addEventListener("click", async () => {
      const ref = doc(db, "posts", docSnap.id);
      await updateDoc(ref, { likes: arrayUnion(currentUser.username) });
    });

    // Comentarios
    const sendComment = div.querySelector(".sendComment");
    sendComment.addEventListener("click", async () => {
      const input = div.querySelector(".commentInput");
      if (input.value.trim() !== "") {
        const ref = doc(db, "posts", docSnap.id);
        await updateDoc(ref, { comments: arrayUnion({ user: currentUser.username, text: input.value }) });
        input.value = "";
      }
    });

    const commentsDiv = div.querySelector(".comments");
    if (data.comments) {
      commentsDiv.innerHTML = data.comments.map(c => `<div class="comment"><b>${c.user}:</b> ${c.text}</div>`).join("");
    }

    return div;
  }

  // Cargar posts
  function loadPosts() {
    const currentUser = getSession();
    const q = query(collection(db, "posts"), orderBy("created", "desc"));
    onSnapshot(q, (snapshot) => {
      const feed = document.getElementById("feed");
      feed.innerHTML = "";
      snapshot.forEach((docSnap) => {
        feed.appendChild(renderPost(docSnap, currentUser));
      });
    });
  }

  // Eventos Auth
  document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = document.getElementById("regUsername").value.trim();
    const password = document.getElementById("regPassword").value;
    try {
      const user = await register(username, password);
      showApp(user);
    } catch (err) {
      document.getElementById("authError").textContent = err.message;
    }
  });

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;
    try {
      const user = await login(username, password);
      showApp(user);
    } catch (err) {
      document.getElementById("authErrorLogin").textContent = err.message;
    }
  });

  document.getElementById("toLogin").addEventListener("click", () => {
    document.getElementById("registerForm").style.display = "none";
    document.getElementById("loginForm").style.display = "flex";
  });
  document.getElementById("toRegister").addEventListener("click", () => {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("registerForm").style.display = "flex";
  });

  // Postear
  document.getElementById("postBtn").addEventListener("click", async () => {
    const user = getSession();
    if (!user) return;
    const text = document.getElementById("postText").value.trim();
    if (text === "") return;
    await addDoc(collection(db, "posts"), {
      user: user.username,
      avatar: user.avatar,
      text,
      created: serverTimestamp(),
      likes: [],
      comments: []
    });
    document.getElementById("postText").value = "";
  });

  // Logout
  document.getElementById("logoutBtn").addEventListener("click", () => {
    clearSession();
    location.reload();
  });

  // Restaurar sesión
  const sessionUser = getSession();
  if (sessionUser) {
    showApp(sessionUser);
  }
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, doc, addDoc, onSnapshot, orderBy, query, serverTimestamp,
  updateDoc, arrayUnion, getDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// --- CONFIG: tu firebaseConfig ---
const firebaseConfig = {
  apiKey: "AIzaSyBwj_as6pb5Bg81F9Cl9VWTKkekMM9Exfk",
  authDomain: "pekora-forum.firebaseapp.com",
  projectId: "pekora-forum",
  storageBucket: "pekora-forum.firebasestorage.app",
  messagingSenderId: "161910967859",
  appId: "1:161910967859:web:6a28cecaae74b9b7e9dd46",
  measurementId: "G-BPBTW5KBRK"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// --- Helpers para sesión (intenta varias llaves por compatibilidad) ---
function getCurrentUserFromStorage() {
  const keys = ['currentUser','sessionUser','user','loggedUser'];
  for (const k of keys) {
    const s = localStorage.getItem(k);
    if (s) {
      try { return JSON.parse(s); } catch(e){ return null; }
    }
  }
  return null;
}

function saveSession(user) {
  // guarda en una llave común por si la app espera 'currentUser'
  localStorage.setItem('currentUser', JSON.stringify(user));
}

// --- util: generar id único para comentarios ---
function genId() {
  return `${Date.now()}-${Math.random().toString(36).slice(2,9)}`;
}

// --- busca elementos con varios posibles ids ---
const postsDiv = document.getElementById('posts') || document.getElementById('feed');
const postInput = document.getElementById('postInput') || document.getElementById('postText');
const postBtn = document.getElementById('postBtn') || document.getElementById('postBtn');

// --- Render de un post (incluye borrar post y borrar comentarios propios) ---
function renderPost(docSnap, sessionUser) {
  const data = docSnap.data() || {};
  const postId = docSnap.id;
  const div = document.createElement('div');
  div.className = 'post';

  // plantilla básica
  div.innerHTML = `
    <img src="${data.avatar || 'https://i.pravatar.cc/40'}" style="width:40px;height:40px;border-radius:50%;"/>
    <div style="flex:1;">
      <div style="display:flex;align-items:center;gap:8px">
        <strong style="color:#1DA1F2">${escapeHtml(data.user || 'Anon')}</strong>
        <span style="color:#999;font-size:13px">@${escapeHtml(data.user || 'anon')}</span>
        <div style="flex:1"></div>
        ${ (sessionUser && data.user === sessionUser.username) ? '<button class="deletePostBtn" title="Eliminar post" style="background:none;border:none;color:red;cursor:pointer">🗑️</button>' : '' }
      </div>
      <div style="margin:8px 0;white-space:pre-wrap">${escapeHtml(data.text || '')}</div>
      <div class="actions" style="display:flex;gap:10px">
        <button class="likeBtn" style="background:none;border:none;cursor:pointer">❤️ <span class="likesCount">${(data.likes && data.likes.length) || 0}</span></button>
        <button class="commentToggleBtn" style="background:none;border:none;cursor:pointer">💬 <span class="commentsCount">${(data.comments && data.comments.length) || 0}</span></button>
      </div>
      <div class="comments" style="margin-top:8px;padding-left:8px"></div>
      <div class="comment-box" style="margin-top:8px;display:flex;gap:6px;align-items:center">
        <input type="text" class="commentInput" placeholder="Escribe un comentario..." style="flex:1;padding:6px;border-radius:6px;border:1px solid #222;background:#0f1113;color:#fff" />
        <button class="sendComment" style="padding:6px 8px;border-radius:6px;background:#1DA1F2;border:none;color:#000;cursor:pointer">Enviar</button>
      </div>
    </div>
  `;

  // --- mostrar / ocultar comentarios con el botón ---
  const commentToggleBtn = div.querySelector('.commentToggleBtn');
  const commentsContainer = div.querySelector('.comments');
  commentToggleBtn && commentToggleBtn.addEventListener('click', () => {
    commentsContainer.style.display = commentsContainer.style.display === 'none' ? 'block' : 'none';
  });

  // --- enviar comentario: añadimos objeto con id, user, text, created ---
  const sendBtn = div.querySelector('.sendComment');
  sendBtn && sendBtn.addEventListener('click', async () => {
    const input = div.querySelector('.commentInput');
    const text = (input && input.value || '').trim();
    const user = getCurrentUserFromStorage();
    if (!user) { alert('Inicia sesión para comentar'); return; }
    if (!text) return;
    const commentObj = { id: genId(), user: user.username, text, created: serverTimestamp() };
    const ref = doc(db, 'posts', postId);
    // usamos arrayUnion para evitar leer-modificar-escribir (más robusto para concurrencia al añadir)
    await updateDoc(ref, { comments: arrayUnion(commentObj) });
    input.value = '';
  });

  // --- renderizar comentarios (y añadir botón eliminar solo si eres autor) ---
  async function renderComments() {
    commentsContainer.innerHTML = '';
    // read latest comments from server to render freshest state (avoids race with other clients)
    try {
      const snap = await getDoc(doc(db, 'posts', postId));
      const serverData = snap.exists() ? snap.data() : {};
      const comments = Array.isArray(serverData.comments) ? serverData.comments : [];
      comments.forEach((c, idx) => {
        const cmDiv = document.createElement('div');
        cmDiv.className = 'comment';
        cmDiv.style.display = 'flex';
        cmDiv.style.alignItems = 'center';
        cmDiv.style.gap = '8px';
        cmDiv.innerHTML = `<div style="flex:1"><b>${escapeHtml(c.user)}</b>: ${escapeHtml(c.text)}</div>`;
        // si es tu comentario, añadir botón borrar
        const session = getCurrentUserFromStorage();
        if (session && c.user === session.username) {
          const del = document.createElement('button');
          del.textContent = '🗑️';
          del.title = 'Eliminar comentario';
          del.style.background = 'none';
          del.style.border = 'none';
          del.style.color = 'red';
          del.style.cursor = 'pointer';
          del.addEventListener('click', async () => {
            try {
              // volver a leer array actual, filtrar por id si existe, si no por la primera coincidencia user+text
              const s2 = await getDoc(doc(db, 'posts', postId));
              const cur = (s2.exists() && Array.isArray(s2.data().comments)) ? s2.data().comments : [];
              let updated;
              if (c.id) {
                updated = cur.filter(cc => cc.id !== c.id);
              } else {
                // fallback: eliminar la primera coincidencia user+text
                let removed = false;
                updated = cur.filter(cc => {
                  if (removed) return true;
                  if (cc.user === c.user && cc.text === c.text) { removed = true; return false; }
                  return true;
                });
              }
              await updateDoc(doc(db, 'posts', postId), { comments: updated });
            } catch (e) {
              console.error('Error al borrar comentario', e);
            }
          });
          cmDiv.appendChild(del);
        }
        commentsContainer.appendChild(cmDiv);
      });
    } catch (err) {
      console.error('Render comments error', err);
    }
  }

  // --- borrar post (solo autor) ---
  const deletePostBtn = div.querySelector('.deletePostBtn');
  if (deletePostBtn) {
    deletePostBtn.addEventListener('click', async () => {
      if (!confirm('¿Eliminar post? Esto no se puede deshacer.')) return;
      try {
        await deleteDoc(doc(db, 'posts', postId));
      } catch (e) {
        console.error('Error al eliminar post', e);
      }
    });
  }

  // --- like: se añade el username al array likes (no se duplica porque puede repetirse; para evitar duplicados
  // podríamos leer y controlar, pero por simplicidad dejamos que el array tenga únicos o no según tu uso) ---
  const likeBtn = div.querySelector('.likeBtn');
  likeBtn && likeBtn.addEventListener('click', async () => {
    const session = getCurrentUserFromStorage();
    if (!session) { alert('Inicia sesión para dar like'); return; }
    const ref = doc(db, 'posts', postId);
    await updateDoc(ref, { likes: arrayUnion(session.username) });
  });

  // --- inicial render de comentarios (y se actualizará cuando onSnapshot re-renderice el post) ---
  renderComments();

  return div;
}

// --- utility para escapar HTML en texto plano ---
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// --- escucha posts en tiempo real (ordenados) ---
const postsContainer = postsDiv || document.getElementById('posts') || document.getElementById('feed');
if (!postsContainer) console.warn('No se encontró contenedor de posts (id="posts" ó id="feed")');

const q = query(collection(db, 'posts'), orderBy('created', 'desc'));
onSnapshot(q, (snapshot) => {
  const sessionUser = getCurrentUserFromStorage();
  if (!postsContainer) return;
  postsContainer.innerHTML = '';
  snapshot.forEach(docSnap => {
    const el = renderPost(docSnap, sessionUser);
    postsContainer.appendChild(el);
  });
});

// --- publicar (intenta varios ids para compatibilidad) ---
const publishBtn = postBtn || document.getElementById('postBtn') || document.querySelector('[data-post-btn]');
const publishInput = postInput || document.getElementById('postText') || document.querySelector('[data-post-input]');

if (publishBtn && publishInput) {
  publishBtn.addEventListener('click', async () => {
    const session = getCurrentUserFromStorage();
    if (!session) { alert('Inicia sesión para publicar'); return; }
    const text = (publishInput.value || '').trim();
    if (!text) return;
    await addDoc(collection(db, 'posts'), {
      user: session.username,
      avatar: session.avatar || `https://i.pravatar.cc/100?u=${encodeURIComponent(session.username)}`,
      text,
      created: serverTimestamp(),
      likes: [],
      comments: []
    });
    publishInput.value = '';
  });
} else {
  console.warn('No se encontró botón o input para publicar (busqué ids postBtn/postInput/postText)');
}
</script>

</body>
</html>
