<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lunetter</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #000;
      color: #fff;
      display: flex;
    }
    /* Sidebar */
    .sidebar {
      width: 220px;
      border-right: 1px solid #222;
      padding: 20px;
      height: 100vh;
    }
    .sidebar a {
      display: block;
      margin: 15px 0;
      color: white;
      text-decoration: none;
      font-size: 18px;
    }
    /* Feed */
    .feed {
      flex: 1;
      max-width: 600px;
      margin: auto;
      padding: 20px;
      border-left: 1px solid #222;
      border-right: 1px solid #222;
      min-height: 100vh;
    }
    .postBox {
      display: flex;
      align-items: flex-start;
      border-bottom: 1px solid #222;
      padding-bottom: 15px;
    }
    .postBox img {
      border-radius: 50%;
      width: 45px;
      height: 45px;
      margin-right: 10px;
    }
    .postBox textarea {
      flex: 1;
      background: #111;
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: 8px;
      outline: none;
      resize: none;
    }
    .postBox button {
      background: #1DA1F2;
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      margin-left: 10px;
    }
    /* Posts */
    .post {
      border-bottom: 1px solid #222;
      padding: 15px;
      display: flex;
      gap: 10px;
    }
    .post img {
      border-radius: 50%;
      width: 45px;
      height: 45px;
    }
    .postContent {
      flex: 1;
    }
    .postContent b {
      color: #1DA1F2;
    }
    .actions {
      margin-top: 8px;
      display: flex;
      gap: 15px;
      font-size: 14px;
      cursor: pointer;
    }
    .comments {
      margin-top: 10px;
      padding-left: 20px;
      border-left: 1px solid #222;
    }
    .comment {
      margin: 5px 0;
      font-size: 14px;
    }
    .commentInput {
      margin-top: 8px;
      display: flex;
      gap: 5px;
    }
    .commentInput input {
      flex: 1;
      padding: 5px;
      border: none;
      border-radius: 5px;
      background: #111;
      color: white;
    }
    .commentInput button {
      background: #1DA1F2;
      border: none;
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <a href="#">Home</a>
    <a href="#">Explore</a>
    <a href="#">Notifications</a>
    <a href="#">Profile</a>
    <a href="#" onclick="logout()">Cerrar sesión</a>
  </div>

  <!-- Feed -->
  <div class="feed">
    <!-- Caja para postear -->
    <div class="postBox">
      <img src="https://i.pravatar.cc/100" alt="avatar">
      <textarea id="postInput" placeholder="What's happening?"></textarea>
      <button onclick="addPost()">Post</button>
    </div>

    <!-- Lista de posts -->
    <div id="posts"></div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { 
      getFirestore, collection, addDoc, onSnapshot, orderBy, query, serverTimestamp, 
      doc, updateDoc, setDoc 
    } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

    // 🔥 Config de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBZvsL3zwUsHmTL0QZxQOkWF28_N2FR4L0",
      authDomain: "lunetter-55d46.firebaseapp.com",
      projectId: "lunetter-55d46",
      storageBucket: "lunetter-55d46.firebasestorage.app",
      messagingSenderId: "798507844928",
      appId: "1:798507844928:web:20e8a48a66a85ee6c6e6a5",
      measurementId: "G-46BL2MEZ68"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Simulación de usuario logueado
    const currentUser = {
      name: "Anon",
      avatar: "https://i.pravatar.cc/100"
    };

    // Publicar
    async function addPost() {
      const input = document.getElementById("postInput");
      const text = input.value.trim();
      if (!text) return;

      await addDoc(collection(db, "posts"), {
        user: currentUser.name,
        avatar: currentUser.avatar,
        text: text,
        created: serverTimestamp()
      });

      input.value = "";
    }

    // Like
    async function toggleLike(postId) {
      const likeRef = doc(db, "posts", postId, "likes", currentUser.name);
      await setDoc(likeRef, { user: currentUser.name }, { merge: true });
    }

    // Comentar
    async function addComment(postId, inputId) {
      const input = document.getElementById(inputId);
      const text = input.value.trim();
      if (!text) return;

      await addDoc(collection(db, "posts", postId, "comments"), {
        user: currentUser.name,
        text: text,
        created: serverTimestamp()
      });

      input.value = "";
    }

    // Render posts en tiempo real
    const postsDiv = document.getElementById("posts");
    const q = query(collection(db, "posts"), orderBy("created", "desc"));

    onSnapshot(q, (snapshot) => {
      postsDiv.innerHTML = "";
      snapshot.forEach(docSnap => {
        const post = docSnap.data();
        const postId = docSnap.id;

        const div = document.createElement("div");
        div.className = "post";

        // Subcolección: Likes
        const likesRef = collection(db, "posts", postId, "likes");
        onSnapshot(likesRef, (likeSnap) => {
          const likes = likeSnap.size;
          div.querySelector(".likesCount").innerText = likes;
        });

        // Subcolección: Comentarios
        const commentsRef = collection(db, "posts", postId, "comments");
        onSnapshot(commentsRef, (commentSnap) => {
          const commentsDiv = div.querySelector(".comments");
          commentsDiv.innerHTML = "";
          commentSnap.forEach(c => {
            const cm = c.data();
            const cmDiv = document.createElement("div");
            cmDiv.className = "comment";
            cmDiv.innerHTML = `<b>${cm.user}:</b> ${cm.text}`;
            commentsDiv.appendChild(cmDiv);
          });
        });

        div.innerHTML = `
          <img src="${post.avatar || "https://i.pravatar.cc/100"}" alt="avatar">
          <div class="postContent">
            <b>${post.user || "Anon"}</b><br>
            ${post.text}
            <div class="actions">
              <span onclick="toggleLike('${postId}')">❤️ <span class="likesCount">0</span></span>
              <span>💬 Comentar</span>
            </div>
            <div class="comments"></div>
            <div class="commentInput">
              <input type="text" id="comment-${postId}" placeholder="Escribe un comentario...">
              <button onclick="addComment('${postId}','comment-${postId}')">Enviar</button>
            </div>
          </div>
        `;

        postsDiv.appendChild(div);
      });
    });

    window.addPost = addPost;
    window.toggleLike = toggleLike;
    window.addComment = addComment;
    window.logout = () => alert("Cerrar sesión aquí");
  </script>
</body>
</html>
