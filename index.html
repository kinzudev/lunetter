<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pekora Forum</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f8fa; }
    header { background: #1da1f2; color: white; padding: 10px; text-align: center; }
    #postArea { padding: 10px; border-bottom: 1px solid #ddd; }
    #postsContainer { padding: 10px; }
    .post { background: white; padding: 10px; margin-bottom: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .post img { max-width: 100%; border-radius: 8px; margin-top: 5px; }
  </style>
</head>
<body>
  <header>
    <h1>Pekora Forum</h1>
  </header>

  <div id="authArea">
    <button onclick="register()">Registrarse</button>
    <button onclick="login()">Iniciar Sesión</button>
    <button onclick="logout()">Cerrar Sesión</button>
  </div>

  <div id="postArea" style="display:none;">
    <textarea id="postText" placeholder="¿Qué estás pensando?" rows="3" style="width:100%;"></textarea><br>
    <!-- Cambié el input de archivo por URL -->
    <input type="text" id="imageUrlInput" placeholder="Pega aquí la URL de una imagen (opcional)" style="width:100%; margin-top:5px;"><br>
    <button id="postBtn">Publicar</button>
  </div>

  <div id="postsContainer"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBwj_as6pb5Bg81F9Cl9VWTKkekMM9Exfk",
      authDomain: "pekora-forum.firebaseapp.com",
      projectId: "pekora-forum",
      storageBucket: "pekora-forum.appspot.com",
      messagingSenderId: "161910967859",
      appId: "1:161910967859:web:6a28cecaae74b9b7e9dd46",
      measurementId: "G-BPBTW5KBRK"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    async function register() {
      const username = prompt("Nombre de usuario:");
      const password = prompt("Contraseña:");
      if (!username || !password) return;
      const fakeEmail = `${username}@pekora.local`;
      try {
        const userCredential = await auth.createUserWithEmailAndPassword(fakeEmail, password);
        await userCredential.user.updateProfile({ displayName: username });
        await db.collection("users").doc(userCredential.user.uid).set({
          username: username,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("Registrado como " + username);
      } catch (err) {
        alert("Error: " + err.message);
      }
    }

    async function login() {
      const username = prompt("Nombre de usuario:");
      const password = prompt("Contraseña:");
      if (!username || !password) return;
      const fakeEmail = `${username}@pekora.local`;
      try {
        await auth.signInWithEmailAndPassword(fakeEmail, password);
        alert("Sesión iniciada como " + username);
      } catch (err) {
        alert("Error: " + err.message);
      }
    }

    function logout() {
      auth.signOut();
      alert("Sesión cerrada");
    }

    auth.onAuthStateChanged(user => {
      document.getElementById("postArea").style.display = user ? "block" : "none";
    });

    // Nuevo script para publicar con URL de imagen
    document.getElementById("postBtn").addEventListener("click", async () => {
      const text = document.getElementById("postText").value.trim();
      const imageUrl = document.getElementById("imageUrlInput").value.trim();

      if (!text && !imageUrl) {
        alert("Escribe algo o agrega una URL de imagen.");
        return;
      }

      const user = auth.currentUser;
      if (!user) {
        alert("Debes iniciar sesión.");
        return;
      }

      try {
        await db.collection("posts").add({
          text,
          imageUrl: imageUrl || null,
          author: user.displayName || user.email,
          uid: user.uid,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        document.getElementById("postText").value = "";
        document.getElementById("imageUrlInput").value = "";
      } catch (err) {
        console.error("Error publicando:", err);
        alert("Hubo un error al publicar.");
      }
    });

    // Renderizar publicaciones
    db.collection("posts").orderBy("createdAt", "desc").onSnapshot(snapshot => {
      const container = document.getElementById("postsContainer");
      container.innerHTML = "";
      snapshot.forEach(doc => {
        const post = doc.data();
        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `
          <p><b>${post.author || "Anónimo"}</b></p>
          <p>${post.text || ""}</p>
          ${post.imageUrl ? `<img src="${post.imageUrl}" alt="imagen">` : ""}
        `;
        container.appendChild(div);
      });
    });
  </script>
</body>
</html>
