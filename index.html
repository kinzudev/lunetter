<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>lunetter</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #000;
      color: #e6e6e6;
      height: 100vh;
      overflow: hidden;
    }

    /* -------- LOGIN PANEL -------- */
    #loginPanel {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .login-box {
      background: #111;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      border: 1px solid #333;
    }

    .login-box h2 {
      margin-bottom: 20px;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      background: #222;
      color: #fff;
      outline: none;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #1DA1F2;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    .error {
      color: red;
      font-size: 14px;
      margin-top: 8px;
    }

    /* -------- APP -------- */
    #app {
      display: none;
      height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 220px;
      border-right: 1px solid #333;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .sidebar button {
      background: none;
      border: none;
      color: #e6e6e6;
      font-size: 18px;
      margin: 15px 0;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      text-align: left;
      padding: 10px 20px;
      border-radius: 30px;
    }

    .sidebar button:hover {
      background-color: #111;
      color: #1DA1F2;
    }

    .feed {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-y: auto;
    }

    .new-post {
      width: 100%;
      max-width: 600px;
      background: #000;
      border-bottom: 1px solid #333;
      display: flex;
      padding: 15px;
    }

    .new-post img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .new-post-content {
      flex: 1;
    }

    .new-post textarea {
      width: 100%;
      background: transparent;
      color: #fff;
      border: none;
      resize: none;
      font-size: 16px;
      padding: 10px 0;
      outline: none;
    }

    .new-post button {
      margin-top: 10px;
      padding: 8px 16px;
      background: #1DA1F2;
      border: none;
      border-radius: 20px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      float: right;
    }

    .post {
      width: 100%;
      max-width: 600px;
      background: #000;
      border-bottom: 1px solid #333;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    .post-header-container {
      display: flex;
    }

    .post img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .post-content {
      flex: 1;
    }

    .post-header {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
    }

    .post-name {
      font-weight: bold;
      margin-right: 5px;
    }

    .post-username {
      color: #777;
      font-size: 14px;
    }

    .post-text {
      font-size: 15px;
      line-height: 1.4;
      margin-bottom: 10px;
    }

    .post-actions {
      display: flex;
      gap: 20px;
      font-size: 14px;
      color: #777;
      cursor: pointer;
    }

    .post-actions span:hover {
      color: #1DA1F2;
    }

    .comments {
      margin-top: 10px;
      border-left: 2px solid #333;
      padding-left: 10px;
    }

    .comment {
      display: flex;
      margin-top: 10px;
    }

    .comment img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .comment-content {
      background: #111;
      border-radius: 10px;
      padding: 8px 12px;
    }

    .comment-input {
      display: flex;
      margin-top: 10px;
    }

    .comment-input input {
      flex: 1;
      background: #111;
      border: none;
      color: #fff;
      padding: 8px;
      border-radius: 20px;
      outline: none;
    }

    .comment-input button {
      margin-left: 8px;
      padding: 6px 12px;
      background: #1DA1F2;
      border: none;
      border-radius: 20px;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- LOGIN PANEL -->
  <div id="loginPanel">
    <div class="login-box">
      <h2>Mini Twitter</h2>
      <input type="text" id="username" placeholder="Usuario">
      <input type="password" id="password" placeholder="Contraseña">
      <button onclick="login()">Login</button>
      <button onclick="register()">Registrarse</button>
      <div id="errorMsg" class="error"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="app">
    <div class="sidebar">
      <button>Home</button>
      <button>Explore</button>
      <button>Notifications</button>
      <button>Profile</button>
      <button onclick="logout()">Cerrar sesión</button>
    </div>

    <div class="feed">
      <!-- New post form -->
      <div class="new-post">
        <img src="https://i.pravatar.cc/48?img=1" alt="Profile">
        <div class="new-post-content">
          <textarea id="postInput" rows="3" placeholder="What's happening?"></textarea>
          <button onclick="addPost()">Post</button>
        </div>
      </div>

      <!-- Posts feed -->
      <div id="posts"></div>
    </div>
  </div>

  <script>
    // --------- LOGIN/REGISTRO ---------
    window.onload = function () {
      const loggedUser = localStorage.getItem("loggedUser");
      if (loggedUser) {
        document.getElementById("loginPanel").style.display = "none";
        document.getElementById("app").style.display = "flex";
      } else {
        document.getElementById("loginPanel").style.display = "flex";
        document.getElementById("app").style.display = "none";
      }
    };

    function getUsers() {
      const users = localStorage.getItem("users");
      return users ? JSON.parse(users) : [];
    }

    function saveUsers(users) {
      localStorage.setItem("users", JSON.stringify(users));
    }

    function register() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const error = document.getElementById("errorMsg");

      if (!username || !password) {
        error.textContent = "Completa todos los campos.";
        return;
      }

      let users = getUsers();
      if (users.find(u => u.username === username)) {
        error.textContent = "El usuario ya existe.";
        return;
      }

      users.push({ username, password });
      saveUsers(users);

      error.style.color = "lightgreen";
      error.textContent = "Registro exitoso. Ahora inicia sesión.";
    }

    function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const error = document.getElementById("errorMsg");

      let users = getUsers();
      let user = users.find(u => u.username === username && u.password === password);

      if (user) {
        localStorage.setItem("loggedUser", username);
        document.getElementById("loginPanel").style.display = "none";
        document.getElementById("app").style.display = "flex";
        error.textContent = "";
      } else {
        error.style.color = "red";
        error.textContent = "Usuario o contraseña incorrectos.";
      }
    }

    function logout() {
      localStorage.removeItem("loggedUser");
      document.getElementById("loginPanel").style.display = "flex";
      document.getElementById("app").style.display = "none";
    }

    // --------- POSTS (likes y comentarios) ---------
    function addPost() {
      const input = document.getElementById('postInput');
      const text = input.value.trim();
      if (text === '') return;

      const postContainer = document.createElement('div');
      postContainer.className = 'post';

      const headerContainer = document.createElement('div');
      headerContainer.className = 'post-header-container';

      const avatar = document.createElement('img');
      avatar.src = "https://i.pravatar.cc/48?img=" + Math.floor(Math.random() * 70);

      const contentWrapper = document.createElement('div');
      contentWrapper.className = 'post-content';

      const header = document.createElement('div');
      header.className = 'post-header';

      const name = document.createElement('span');
      name.className = 'post-name';
      name.textContent = localStorage.getItem("loggedUser");

      const username = document.createElement('span');
      username.className = 'post-username';
      username.textContent = " @" + localStorage.getItem("loggedUser");

      const content = document.createElement('div');
      content.className = 'post-text';
      content.textContent = text;

      header.appendChild(name);
      header.appendChild(username);

      contentWrapper.appendChild(header);
      contentWrapper.appendChild(content);

      headerContainer.appendChild(avatar);
      headerContainer.appendChild(contentWrapper);

      postContainer.appendChild(headerContainer);

      // Post actions
      const actions = document.createElement('div');
      actions.className = 'post-actions';

      const likeBtn = document.createElement('span');
      likeBtn.textContent = "❤️ 0";
      likeBtn.onclick = () => {
        let count = parseInt(likeBtn.textContent.replace("❤️", "").trim());
        likeBtn.textContent = "❤️ " + (count + 1);
      };

      const commentBtn = document.createElement('span');
      commentBtn.textContent = "💬 Comment";
      commentBtn.onclick = () => showCommentBox(postContainer);

      actions.appendChild(likeBtn);
      actions.appendChild(commentBtn);

      postContainer.appendChild(actions);

      // Comment section
      const commentsSection = document.createElement('div');
      commentsSection.className = 'comments';
      postContainer.appendChild(commentsSection);

      const posts = document.getElementById('posts');
      posts.insertBefore(postContainer, posts.firstChild);

      input.value = '';
    }

    function showCommentBox(postContainer) {
      if (postContainer.querySelector('.comment-input')) return;

      const commentBox = document.createElement('div');
      commentBox.className = 'comment-input';

      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'Write a comment...';

      const button = document.createElement('button');
      button.textContent = 'Reply';
      button.onclick = () => {
        if (input.value.trim() === '') return;
        addComment(postContainer, input.value);
        commentBox.remove();
      };

      commentBox.appendChild(input);
      commentBox.appendChild(button);

      postContainer.appendChild(commentBox);
    }

    function addComment(postContainer, text) {
      const commentsSection = postContainer.querySelector('.comments');

      const comment = document.createElement('div');
      comment.className = 'comment';

      const avatar = document.createElement('img');
      avatar.src = "https://i.pravatar.cc/32?img=" + Math.floor(Math.random() * 70);

      const content = document.createElement('div');
      content.className = 'comment-content';
      content.textContent = text;

      comment.appendChild(avatar);
      comment.appendChild(content);

      commentsSection.appendChild(comment);
    }
  </script>
</body>
</html>
